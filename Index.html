        const quarters = [
          { name: '2Q', months: [4, 5, 6] },
          { name: '3Q', months: [7, 8, 9] },
          { name: '4Q', months: [10, 11, 12] }
        ];

        const allMonths = quarters.flatMap(q => q.months);

        const getCatMonthlyTotal = (cat, month) => {
          if (!cat.clients || cat.clients.length === 0) return 0;
          if (cat.type === 'simple') {
            return cat.clients.reduce((sum, client) => {
              if (client.isRegion) return sum;
              // 하위 subClients가 있으면 subClients의 합을 반환, 없으면 본인 data 반환
              if (client.subClients && client.subClients.length > 0) {
                 return sum + client.subClients.reduce((subSum, sub) => subSum + (sub.data[month] || 0), 0);
              }
              return sum + (client.data[month] || 0);
            }, 0);
          } else {
            return cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data.shipment[month] || 0)), 0);
          }
        };

        const getClientMonthlyTotal = (client, month, type = 'simple') => {
          if (type === 'simple') {
            if (client.subClients && client.subClients.length > 0) {
              return client.subClients.reduce((sum, sub) => sum + (sub.data[month] || 0), 0);
            }
            return client.data[month] || 0;
          } else {
             return client.data.shipment[month] || 0;
          }
        };

        const hatchedBg = "bg-[repeating-linear-gradient(-45deg,#f8fafc,#f8fafc_6px,#e2e8f0_6px,#e2e8f0_12px)]";

        function OdmDashboard() {
          const [expandedCats, setExpandedCats] = useState(['m-odm', 'g-odm', 'g-wholesale']);
          const [expandedClients, setExpandedClients] = useState([]);

          const toggleCat = (catId) => {
            setExpandedCats(prev => prev.includes(catId) ? prev.filter(id => id !== catId) : [...prev, catId]);
          };

          const toggleClient = (clientId) => {
            setExpandedClients(prev => prev.includes(clientId) ? prev.filter(id => id !== clientId) : [...prev, clientId]);
          };

          const totals = useMemo(() => {
            let contractTotals = { monthly: {}, q2to4: 0 };
            let poTotals = { monthly: {}, q2to4: 0 };
            let shipmentTotals = { monthly: {}, q2to4: 0 };

            allMonths.forEach(m => { contractTotals.monthly[m] = 0; poTotals.monthly[m] = 0; shipmentTotals.monthly[m] = 0; });

            dashboardData.forEach(div => {
              div.categories.forEach(cat => {
                allMonths.forEach(m => {
                  if (cat.type === 'simple') {
                    const val = getCatMonthlyTotal(cat, m);
                    contractTotals.monthly[m] += val; poTotals.monthly[m] += val; shipmentTotals.monthly[m] += val;
                    contractTotals.q2to4 += val; poTotals.q2to4 += val; shipmentTotals.q2to4 += val;
                  } else if (cat.type === 'pipeline') {
                    const cVal = cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data.contract[m] || 0)), 0);
                    const pVal = cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data.po[m] || 0)), 0);
                    const sVal = getCatMonthlyTotal(cat, m);

                    contractTotals.monthly[m] += cVal; poTotals.monthly[m] += pVal; shipmentTotals.monthly[m] += sVal;
                    contractTotals.q2to4 += cVal; poTotals.q2to4 += pVal; shipmentTotals.q2to4 += sVal;
                  }
                });
              });
            });

            return { contract: contractTotals, po: poTotals, shipment: shipmentTotals };
          }, []);

          const renderPipelineStageCell = (value, type) => {
            if (!value) return null;
            let styles = '';
            if (type === 'contract') styles = 'bg-blue-50 text-blue-700 font-medium border-blue-200';
            if (type === 'po') styles = 'bg-purple-50 text-purple-700 font-medium border-purple-200';
            if (type === 'shipment') styles = 'bg-emerald-50 text-emerald-700 font-bold border-emerald-300';

            return (
              <div className={`mx-auto w-10 py-0.5 rounded text-xs border border-opacity-40 shadow-sm ${styles}`}>
                {value.toFixed(1).replace('.0', '')}
              </div>
            );
          };

          return (
            <div className="min-h-screen p-4 font-sans text-gray-800">
              <div className="max-w-[1400px] mx-auto space-y-4">

                      <TrendingUp className="text-blue-600" size={28} />
                      전사 영업/생산 통합 파이프라인 관리 보드
                    </h1>
                    <p className="text-gray-500 mt-1 text-sm">
                      뷰티/메디컬/글로벌 전 부문 매출(출고) 계획 및 ODM 비즈니스 선행지표(계약, 발주) 트래킹 <span className="font-semibold text-gray-700">[단위: 억 원]</span>
                    </p>
                  </div>
                  <div className="flex gap-4 bg-gray-50 px-4 py-2 rounded-lg border border-gray-100 text-xs">
                    <div className="flex items-center gap-1.5"><FileSignature size={14} className="text-blue-600"/> <span className="text-gray-600">① 계약</span></div>
                    <div className="flex items-center gap-1.5"><ShoppingCart size={14} className="text-purple-600"/> <span className="text-gray-600">② 발주</span></div>
                    <div className="flex items-center gap-1.5"><Truck size={14} className="text-emerald-600"/> <span className="text-gray-600">③ 출고(매출)</span></div>
                  </div>
                </div>

                {/* Main Table */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[1200px]">
                    <thead>
                      <tr className="bg-slate-100 text-slate-700 text-sm border-b border-gray-300">
                        <th colSpan="2" className="p-3 font-bold border-r border-gray-300 text-center">구분</th>
                        <th className="p-3 font-bold border-r border-gray-300 text-center w-16">1Q 소계</th>
                        <th className="p-3 font-bold border-r border-gray-300 text-center w-20">2-4Q 소계</th>
                        {quarters.map(q => (
                          <th key={q.name} colSpan="3" className="p-2 text-center font-bold border-r border-gray-300 last:border-0 bg-slate-200">
                            {q.name}
                          </th>
                        ))}
                      </tr>
                      <tr className="bg-slate-50 text-slate-600 text-xs border-b border-gray-300">
                        <th className="p-2 w-28 border-r border-gray-300 text-center">사업부</th>
                        <th className="p-2 w-44 border-r border-gray-300 text-center">세부항목</th>
                        <th className="p-2 border-r border-gray-300 text-center text-[10px] font-normal text-gray-400 leading-tight">실적<br/>(확정)</th>
                        <th className="p-2 border-r border-gray-300 text-center text-[10px] font-normal text-gray-400">누적<br/>예상</th>
                        {quarters.map((q, qIndex) => (
                          q.months.map((m, mIndex) => (
                            <th key={m} className={`p-2 text-center w-16 ${mIndex === 2 && qIndex !== 2 ? 'border-r border-gray-300' : 'border-r border-gray-200'}`}>

                            </th>
                          ))

                      </tr>
                    </thead>
                    <tbody className="text-sm">
                      {dashboardData.map((division) => {
                        return division.categories.map((cat, catIndex) => {
                          const isFirstCat = catIndex === 0;
                          
                          let rowTotal2_4Q = 0;
                          allMonths.forEach(m => {
                            rowTotal2_4Q += getCatMonthlyTotal(cat, m);
                          });

                          return (
                            <React.Fragment key={cat.id}>
                              {/* Category Main Row */}
                              <tr className="border-b border-gray-200 hover:bg-gray-50 transition-colors">
                                <td className={`${division.color} border-r ${division.colorBorder} text-center font-bold text-gray-800`}>
                                  {isFirstCat && division.name}
                                </td>
                                <td className="p-2.5 border-r border-gray-200 text-gray-700">
                                  <div 
                                    className={`font-bold flex items-center justify-between group ${cat.clients.length > 0 ? 'cursor-pointer text-gray-900' : 'text-gray-500'}`}
                                    onClick={() => cat.clients.length > 0 && toggleCat(cat.id)}
                                  >
                                    <span>
                                      {cat.name} 
                                      {cat.type === 'pipeline' && <span className="text-[10px] font-normal text-emerald-600 bg-emerald-50 px-1 py-0.5 rounded ml-1 border border-emerald-100">파이프라인</span>}
                                    </span>
                                    {cat.clients.length > 0 && (
                                      expandedCats.includes(cat.id) ? <ChevronDown size={16} className="text-gray-400"/> : <ChevronRight size={16} className="text-gray-400"/>
                                    )}
                                  </div>
                                </td>
                                <td className={`border-r border-gray-200 ${hatchedBg}`}></td>
                                <td className="p-2 border-r border-gray-200 text-center font-semibold text-gray-800 bg-gray-50/50">
                                  {rowTotal2_4Q > 0 ? rowTotal2_4Q.toFixed(1).replace('.0', '') : '-'}
                                </td>
                                {allMonths.map((m, mIndex) => {
                                  const totalVal = getCatMonthlyTotal(cat, m);
                                  let cellContent = null;
                                  if (totalVal > 0) {
                                    if (cat.type === 'simple') {
                                      cellContent = <div className="text-center font-semibold text-gray-800">{totalVal.toFixed(1).replace('.0', '')}</div>;
                                    } else {
                                      cellContent = <div className="text-center font-bold text-emerald-700 bg-emerald-50/50 rounded py-0.5">{totalVal.toFixed(1).replace('.0', '')}</div>;
                                    }
                                  }
                                  const isQEnd = mIndex === 2 || mIndex === 5;
                                  return (
                                    <td key={m} className={`p-1 align-middle border-r ${isQEnd ? 'border-gray-300' : 'border-gray-100'}`}>
                                      {cellContent}
                                    </td>
                                  );
                                })}
                              </tr>

                              {/* Expanded Simple Items (Non-ODM) */}
                              {cat.type === 'simple' && expandedCats.includes(cat.id) && cat.clients.map(client => {
                                if (client.isRegion) {
                                  return (
                                    <tr key={client.id} className="border-b border-gray-100 bg-teal-50/60">
                                      <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                      <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs font-bold text-teal-800 pl-4">
                                        {client.name}
                                      </td>
                                      {allMonths.map((m, mIndex) => (
                                        <td key={`reg-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'}`}></td>
                                      ))}
                                    </tr>
                                  );
                                }
                                
                                const hasSubClients = client.subClients && client.subClients.length > 0;
                                const isClientExpanded = expandedClients.includes(client.id);

                                return (
                                  <React.Fragment key={client.id}>
                                    <tr className="border-b border-gray-100 bg-slate-50/40 hover:bg-slate-100 transition-colors">
                                      <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                      <td colSpan="3" 
                                          className={`p-2 border-r border-gray-200 text-sm text-gray-600 pl-8 ${hasSubClients ? 'cursor-pointer' : ''}`}
                                          onClick={() => hasSubClients && toggleClient(client.id)}>
                                        <div className="flex items-center gap-1.5">
                                          {hasSubClients && (isClientExpanded ? <ChevronDown size={14} className="text-gray-400"/> : <ChevronRight size={14} className="text-gray-400"/>)}
                                          <span className="font-medium">└ {client.name}</span>
                                        </div>
                                      </td>
                                      {allMonths.map((m, mIndex) => {
                                        const cVal = getClientMonthlyTotal(client, m, 'simple');
                                        return (
                                          <td key={`simple-c-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                            {cVal > 0 ? <span className="text-gray-700">{cVal.toFixed(1).replace('.0', '')}</span> : null}
                                          </td>
                                        );
                                      })}
                                    </tr>
                                    
                                    {/* SubClients (e.g., Companies under Country) */}
                                    {hasSubClients && isClientExpanded && client.subClients.map(sub => (
                                      <tr key={sub.id} className="border-b border-gray-50 bg-white hover:bg-slate-50 transition-colors">
                                         <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                         <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-14">
                                            - {sub.name}
                                         </td>
                                         {allMonths.map((m, mIndex) => (
                                           <td key={`simple-sub-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                             {sub.data[m] ? <span className="text-gray-600">{sub.data[m].toFixed(1).replace('.0', '')}</span> : null}
                                           </td>
                                         ))}
                                      </tr>
                                    ))}
                                  </React.Fragment>
                                );
                              })}

                              {/* Expanded Pipeline Items (ODM) */}
                              {cat.type === 'pipeline' && expandedCats.includes(cat.id) && cat.clients.map(client => {
                                const hasSubClients = client.subClients && client.subClients.length > 0;
                                const isClientExpanded = expandedClients.includes(client.id);

                                return (
                                  <React.Fragment key={client.id}>
                                    {/* Main Pipeline Row (Country or Direct Client) */}
                                    <tr className="border-b border-gray-100 bg-slate-50/40 hover:bg-slate-100 transition-colors">
                                      <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                      <td colSpan="3" className="p-2 border-r border-gray-200 text-sm text-gray-700 pl-6 cursor-pointer" onClick={() => toggleClient(client.id)}>
                                        <div className="flex items-center gap-2">
                                          {isClientExpanded ? <ChevronDown size={14} className="text-gray-400"/> : <ChevronRight size={14} className="text-gray-400"/>}
                                          <span className="font-medium">└ {client.name}</span>
                                        </div>
                                      </td>
                                      {allMonths.map((m, mIndex) => (
                                        <td key={`client-s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                          {/* Show aggregate if it HAS subClients OR it's a direct client but currently collapsed */}
                                          {(!isClientExpanded || hasSubClients) && renderPipelineStageCell(client.data.shipment[m], 'shipment')}
                                        </td>
                                      ))}
                                    </tr>

                                    {/* If it has subClients (Countries with Companies) */}
                                    {hasSubClients && isClientExpanded && client.subClients.map(sub => {
                                      const isSubExpanded = expandedClients.includes(sub.id);
                                      return (
                                        <React.Fragment key={sub.id}>
                                          {/* SubClient (Company) Row */}
                                          <tr className="border-b border-gray-50 bg-white hover:bg-slate-50 transition-colors">
                                            <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                            <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-700 pl-12 cursor-pointer" onClick={() => toggleClient(sub.id)}>
                                              <div className="flex items-center gap-1.5">
                                                {isSubExpanded ? <ChevronDown size={12} className="text-gray-400"/> : <ChevronRight size={12} className="text-gray-400"/>}
                                                <span className="font-medium">- {sub.name}</span>
                                              </div>
                                            </td>
                                            {allMonths.map((m, mIndex) => (
                                              <td key={`sub-s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                                {!isSubExpanded && renderPipelineStageCell(sub.data.shipment[m], 'shipment')}
                                              </td>
                                            ))}
                                          </tr>

                                          {/* 3-Stages for Company */}
                                          {isSubExpanded && (
                                            <>
                                              <tr className="border-b border-gray-50 bg-slate-50/30">
                                                <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                                <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-16 flex items-center gap-1.5">
                                                  <FileSignature size={12} className="text-blue-500"/> ① 계약
                                                </td>
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`c-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-blue-50/10`}>
                                                    {renderPipelineStageCell(sub.data.contract[m], 'contract')}
                                                  </td>
                                                ))}
                                              </tr>
                                              <tr className="border-b border-gray-50 bg-slate-50/30">
                                                <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                                <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-16 flex items-center gap-1.5">
                                                  <ShoppingCart size={12} className="text-purple-500"/> ② 발주
                                                </td>
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`p-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-purple-50/10`}>
                                                    {renderPipelineStageCell(sub.data.po[m], 'po')}
                                                  </td>
                                                ))}
                                              </tr>
                                              <tr className="border-b border-gray-100 bg-slate-50/30">
                                                <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                                <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs font-medium text-emerald-700 pl-16 flex items-center gap-1.5">
                                                  <Truck size={12} className="text-emerald-500"/> ③ 출고
                                                </td>
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-emerald-50/20`}>
                                                    {renderPipelineStageCell(sub.data.shipment[m], 'shipment')}
                                                  </td>
                                                ))}
                                              </tr>
                                            </>
                                          )}
                                        </React.Fragment>
                                      );
                                    })}

                                    {/* If it DOES NOT have subClients (Direct Company with 3-Stages, like 메디컬 ODM) */}
                                    {!hasSubClients && isClientExpanded && (
                                      <>
                                        <tr className="border-b border-gray-50 bg-white">
                                          <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                          <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-12 flex items-center gap-1.5">
                                            <FileSignature size={12} className="text-blue-500"/> ① 계약
                                          </td>
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`c-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-blue-50/10`}>
                                              {renderPipelineStageCell(client.data.contract[m], 'contract')}
                                            </td>
                                          ))}
                                        </tr>
                                        <tr className="border-b border-gray-50 bg-white">
                                          <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                          <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-12 flex items-center gap-1.5">
                                            <ShoppingCart size={12} className="text-purple-500"/> ② 발주
                                          </td>
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`p-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-purple-50/10`}>
                                              {renderPipelineStageCell(client.data.po[m], 'po')}
                                            </td>
                                          ))}
                                        </tr>
                                        <tr className="border-b border-gray-200 bg-white">
                                          <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                          <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs font-medium text-emerald-700 pl-12 flex items-center gap-1.5">
                                            <Truck size={12} className="text-emerald-500"/> ③ 출고
                                          </td>
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-emerald-50/20`}>
                                              {renderPipelineStageCell(client.data.shipment[m], 'shipment')}
                                            </td>
                                          ))}
                                        </tr>
                                      </>
                                    )}
                                  </React.Fragment>
                                );
                              })}
                            </React.Fragment>
                          );
                        });
                      })}
                      
                      {/* Total Rows */}
                      <tr className="bg-slate-800 text-white font-bold tracking-wide border-b border-slate-700">
                        <td rowSpan="3" className="p-3 text-center border-r border-slate-700 align-middle bg-slate-900">
                          합계 <br/><span className="text-xs font-normal text-slate-400 mt-1 block">(현재 확보 물량)</span>
                        </td>
                        <td className="p-2 text-left pl-4 border-r border-slate-700 text-blue-300 text-sm bg-slate-800/80">
                          ① 계약 체결 기준
                        </td>
                        <td className="p-2 text-center border-r border-slate-700 text-blue-300 bg-slate-800/80">
                          12.3
                        </td>
                        <td className="p-2 text-center border-r border-slate-700 text-blue-300 bg-slate-800/80">
                          {totals.contract.q2to4.toFixed(1).replace('.0', '')}
                        </td>
                        {allMonths.map((m, mIndex) => {
                           const isQEnd = mIndex === 2 || mIndex === 5;
                           return (
                            <td key={`total-c-${m}`} className={`p-2 text-center border-r ${isQEnd ? 'border-slate-600' : 'border-slate-700'} bg-slate-800/80 text-blue-300`}>
                              {totals.contract.monthly[m].toFixed(1).replace('.0', '')}
                            </td>
                           )
                        })}
                      </tr>
                      <tr className="bg-slate-800 text-white font-bold tracking-wide border-b border-slate-700">
                        <td className="p-2 text-left pl-4 border-r border-slate-700 text-purple-300 text-sm bg-slate-800/90">
                          ② 발주 기준 <br/><span className="text-[10px] font-normal text-purple-400">(선급금 50%)</span>
                        </td>
                        <td className="p-2 text-center border-r border-slate-700 text-purple-300 bg-slate-800/90">
                          12.3
                        </td>
                        <td className="p-2 text-center border-r border-slate-700 text-purple-300 bg-slate-800/90">
                          {totals.po.q2to4.toFixed(1).replace('.0', '')}
                        </td>
                        {allMonths.map((m, mIndex) => {
                           const isQEnd = mIndex === 2 || mIndex === 5;
                           return (
                            <td key={`total-p-${m}`} className={`p-2 text-center border-r ${isQEnd ? 'border-slate-600' : 'border-slate-700'} bg-slate-800/90 text-purple-300`}>
                              {totals.po.monthly[m].toFixed(1).replace('.0', '')}
                            </td>
                           )
                        })}
                      </tr>
                      <tr className="bg-slate-800 text-white font-bold tracking-wide">
                        <td className="p-2 text-left pl-4 border-r border-slate-700 text-emerald-300 text-sm">
                          ③ 출고 기준 <br/><span className="text-[10px] font-normal text-emerald-400">(매출액 인식)</span>
                        </td>
                        <td className="p-2 text-center border-r border-slate-700 text-emerald-300">
                          12.3
                        </td>
                        <td className="p-2 text-center border-r border-slate-700 text-emerald-300">
                          {totals.shipment.q2to4.toFixed(1).replace('.0', '')}
                        </td>
                        {allMonths.map((m, mIndex) => {
                           const isQEnd = mIndex === 2 || mIndex === 5;
                           return (
                            <td key={`total-s-${m}`} className={`p-2 text-center border-r ${isQEnd ? 'border-slate-600' : 'border-slate-700'} text-emerald-300`}>
                              {totals.shipment.monthly[m].toFixed(1).replace('.0', '')}
                            </td>
                           )
                        })}
                      </tr>
                    </tbody>
                  </table>
                </div>

                {/* Info Legend */}
                <div className="bg-blue-50/50 border border-blue-100 rounded-xl p-4 flex gap-3 text-sm text-blue-900 items-start">
                  <Info className="shrink-0 mt-0.5 text-blue-600" size={18} />
                  <div className="space-y-1">
                    <p><strong>활용 안내:</strong> <strong>국가명</strong> 옆의 화살표를 클릭하면 <strong>세부 거래처(회사명)</strong> 리스트가 확장됩니다. <strong>ODM 사업</strong>의 경우, 거래처를 한 번 더 클릭하여 계약 ➔ 발주 ➔ 출고 흐름을 상세하게 트래킹할 수 있습니다.</p>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OdmDashboard />);
    </script>
</body>
</html>

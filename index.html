                      })}
                      
                      {/* Total Rows */}
                      <tr className="bg-slate-800 text-white font-bold tracking-wide border-b border-slate-700">
                        <td rowSpan="3" colSpan="2" className="p-3 text-center border-r border-slate-700 align-middle bg-slate-900 text-base keep-all whitespace-nowrap">
                          합계
                        </td>
                        <td className="p-2 text-center border-r border-slate-700 text-blue-100 bg-slate-800/80 text-base">{(12.3 + totals.contract.q2to4).toFixed(1).replace('.0', '')}</td>
                        {showSubtotals && <td className="p-2 text-center border-r border-slate-700 text-blue-300 bg-slate-800/80 font-normal">12.3</td>}
                        {showSubtotals && <td className="p-2 text-center border-r border-slate-700 text-blue-300 bg-slate-800/80 font-normal">{totals.contract.q2to4.toFixed(1).replace('.0', '')}</td>}
                        {allMonths.map((m, mIndex) => (
                            <td key={`total-c-${m}`} className={`p-2 text-center border-r ${mIndex === 2 || mIndex === 5 ? 'border-slate-600' : 'border-slate-700'} bg-slate-800/80 text-blue-300`}>{totals.contract.monthly[m] > 0 ? totals.contract.monthly[m].toFixed(1).replace('.0', '') : '-'}</td>
                        ))}
                      </tr>
                      <tr className="bg-slate-800 text-white font-bold tracking-wide border-b border-slate-700">
                        <td className="p-2 text-center border-r border-slate-700 text-purple-100 bg-slate-800/90 text-base">{(12.3 + totals.po.q2to4).toFixed(1).replace('.0', '')}</td>
                        {showSubtotals && <td className="p-2 text-center border-r border-slate-700 text-purple-300 bg-slate-800/90 font-normal">12.3</td>}
                        {showSubtotals && <td className="p-2 text-center border-r border-slate-700 text-purple-300 bg-slate-800/90 font-normal">{totals.po.q2to4.toFixed(1).replace('.0', '')}</td>}
                        {allMonths.map((m, mIndex) => (
                            <td key={`total-p-${m}`} className={`p-2 text-center border-r ${mIndex === 2 || mIndex === 5 ? 'border-slate-600' : 'border-slate-700'} bg-slate-800/90 text-purple-300`}>{totals.po.monthly[m] > 0 ? totals.po.monthly[m].toFixed(1).replace('.0', '') : '-'}</td>
                        ))}
                      </tr>
                      <tr className="bg-slate-800 text-white font-bold tracking-wide">
                        <td className="p-2 text-center border-r border-slate-700 text-emerald-100 text-base">{(12.3 + totals.shipment.q2to4).toFixed(1).replace('.0', '')}</td>
                        {showSubtotals && <td className="p-2 text-center border-r border-slate-700 text-emerald-300 font-normal">12.3</td>}
                        {showSubtotals && <td className="p-2 text-center border-r border-slate-700 text-emerald-300 font-normal">{totals.shipment.q2to4.toFixed(1).replace('.0', '')}</td>}
                        {allMonths.map((m, mIndex) => (
                            <td key={`total-s-${m}`} className={`p-2 text-center border-r ${mIndex === 2 || mIndex === 5 ? 'border-slate-600' : 'border-slate-700'} text-emerald-300`}>{totals.shipment.monthly[m] > 0 ? totals.shipment.monthly[m].toFixed(1).replace('.0', '') : '-'}</td>
                        ))}
                      </tr>
                    </tbody>
                  </table>
                </div>

                {/* Info Legend */}
                <div className="bg-blue-50/50 border border-blue-100 rounded-xl p-4 flex gap-3 text-sm text-blue-900 items-start">
                  <Info className="shrink-0 mt-0.5 text-blue-600" size={18} />
                  <div className="space-y-1 keep-all">
                    <p><strong>활용 안내:</strong> <strong>국가명</strong> 옆의 화살표를 클릭하면 <strong>세부 거래처(회사명)</strong> 리스트가 확장됩니다. <strong>ODM 사업</strong>의 경우, 거래처를 한 번 더 클릭하여 계약 ➔ 발주 ➔ 출고 흐름을 상세하게 트래킹할 수 있습니다.</p>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OdmDashboard />);
    </script>
</body>
</html>

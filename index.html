<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODM 파이프라인 통합 관리 대시보드</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        /* input number 화살표 제거 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        /* 한국어 단어 단위 줄바꿈 유지 */
        .keep-all { word-break: keep-all; }
        
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50/50">
    <div id="root"></div>

    <script type="text/babel">
        // ★★★ 여기에 본인의 Supabase 프로젝트 정보를 입력하세요 ★★★
        const SUPABASE_URL = 'https://mfnzqerkzsvdsaszuwil.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mbnpxZXJrenN2ZHNhc3p1d2lsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTc0NjgsImV4cCI6MjA5NjU5MzQ2OH0.i9tSTw8r8plr7JTcTFg54bzIGw8XipNSsddx14MhznY';
        
        const isSupabaseConfigured = SUPABASE_URL.startsWith('http');
        const supabase = isSupabaseConfigured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        const { useState, useMemo, useEffect } = React;

        // 아이콘 컴포넌트들
        const ChevronDown = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const ChevronRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const ChevronLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const FileSignature = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 19.5v.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h5.5"/><path d="M8 11h2"/><path d="M8 15h2"/><path d="M12.64 12.64a2 2 0 1 1 2.82-2.82L20 14.36V16h-1.64z"/><path d="m16 16-2-2"/></svg>;
        const ShoppingCart = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>;
        const Truck = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>;
        const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
        const Info = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Save = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const Edit2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
        const Plus = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const Trash = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const GripVertical = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>;

        const quarters = [
          { name: '2Q', months: [4, 5, 6] },
          { name: '3Q', months: [7, 8, 9] },
          { name: '4Q', months: [10, 11, 12] }
        ];
        const allMonths = quarters.flatMap(q => q.months);
        const hatchedBg = "bg-[repeating-linear-gradient(-45deg,#f8fafc,#f8fafc_6px,#e2e8f0_6px,#e2e8f0_12px)]";

        // 개별 셀 에디터 컴포넌트
        const EditableCell = ({ value, isEditMode, isNew, onSave, baseClass = "", editClass = "" }) => {
            const [val, setVal] = useState(value || '');

            useEffect(() => { setVal(value || ''); }, [value]);

            const handleBlur = () => {
                if (isNew) {
                    if (val) {
                        alert("새로 추가된 항목입니다.\n먼저 우측 상단의 [변경사항 저장] 버튼을 눌러 구조를 저장한 뒤 실적을 입력해주세요.");
                        setVal('');
                    }
                    return;
                }

                const numVal = parseFloat(val);
                const oldVal = parseFloat(value || 0);
                
                if (isNaN(numVal) && !val) {
                    if (value !== null && value !== undefined) onSave(null);
                } else if (!isNaN(numVal) && numVal !== oldVal) {
                    onSave(numVal);
                } else {
                    setVal(value || '');
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') e.target.blur();
            };

            if (isEditMode) {
                return (
                    <input 
                        type="number" 
                        value={val}
                        onChange={e => setVal(e.target.value)}
                        onBlur={handleBlur}
                        onKeyDown={handleKeyDown}
                        disabled={isNew}
                        title={isNew ? "먼저 변경사항을 저장해주세요" : "실적 입력"}
                        className={`w-full max-w-[3rem] mx-auto block text-center py-0.5 border-b-2 border-blue-500 bg-white focus:outline-none focus:bg-blue-50 focus:ring-1 ring-blue-200 text-xs shadow-inner rounded-sm transition-all ${isNew ? 'bg-gray-100 cursor-not-allowed opacity-50' : ''} ${editClass}`}
                        placeholder="-"
                        step="0.1"
                    />
                );
            }
            
            if (!value) return <span className="text-transparent">-</span>;
            return <div className={`mx-auto w-10 py-0.5 rounded text-xs ${baseClass}`}>{parseFloat(value).toFixed(1).replace('.0', '')}</div>;
        };

        const getStageTotal = (dataObj, stage, allMonths) => allMonths.reduce((sum, m) => sum + (dataObj?.[stage]?.[m] || 0), 0);

        function OdmDashboard() {
          const [dbData, setDbData] = useState([]);
          const [draftData, setDraftData] = useState(null); // 편집 모드용 로컬 상태
          const [deletedClientIds, setDeletedClientIds] = useState([]); // 삭제된 ID 트래킹

          const [loading, setLoading] = useState(true);
          const [isEditMode, setIsEditMode] = useState(false);
          const [expandedCats, setExpandedCats] = useState(['m-odm', 'g-odm', 'g-wholesale']);
          const [expandedClients, setExpandedClients] = useState([]);
          const [showSubtotals, setShowSubtotals] = useState(true);

          // Drag and Drop 상태
          const [draggedItem, setDraggedItem] = useState(null);
          const [dropTarget, setDropTarget] = useState(null);

          // 현재 활성화된 데이터 (읽기모드 = dbData, 편집모드 = draftData)
          const currentData = isEditMode && draftData ? draftData : dbData;

          // Supabase 데이터 패칭
          const fetchSupabaseData = async () => {
            if (!isSupabaseConfigured) {
               console.warn("Supabase URL이 설정되지 않았습니다.");
               setLoading(false); return;
            }
            try {
                setLoading(true);
                const { data: divs } = await supabase.from('divisions').select('*').order('order_idx');
                const { data: cats } = await supabase.from('categories').select('*').order('order_idx');
                const { data: clis } = await supabase.from('clients').select('*').order('order_idx');
                const { data: mData } = await supabase.from('monthly_data').select('*');

                if (!divs || divs.length === 0) { setDbData([]); setLoading(false); return; }

                const tree = divs.map(div => ({
                    ...div,
                    colorBorder: div.color_border,
                    categories: cats.filter(c => c.division_id === div.id).map(cat => {
                        const catClients = clis.filter(c => c.category_id === cat.id && !c.parent_id);
                        return {
                            ...cat,
                            clients: catClients.map(cli => {
                                const subClients = clis.filter(c => c.parent_id === cli.id);
                                const populateData = (cId) => {
                                    const cData = mData.filter(m => m.client_id === cId);
                                    if (cat.type === 'simple') {
                                        const d = {}; cData.forEach(m => d[m.month] = parseFloat(m.value)); return d;
                                    } else {
                                        const d = { contract: {}, po: {}, shipment: {} };
                                        cData.forEach(m => { if(d[m.data_type]) d[m.data_type][m.month] = parseFloat(m.value); }); return d;
                                    }
                                };
                                return {
                                    ...cli,
                                    isRegion: cli.is_region,
                                    data: cli.is_region ? null : populateData(cli.id),
                                    subClients: subClients.map(sub => ({ ...sub, data: populateData(sub.id) }))
                                };
                            })
                        };
                    })
                }));
                setDbData(tree);
            } catch (error) { console.error(error); } finally { setLoading(false); }
          };

          useEffect(() => { fetchSupabaseData(); }, []);

          // --- 편집 모드 제어 ---
          const startEditMode = () => {
              setDraftData(JSON.parse(JSON.stringify(dbData)));
              setDeletedClientIds([]);
              setIsEditMode(true);
          };

          const cancelEditMode = () => {
              if(confirm("수정한 내용이 모두 초기화됩니다. 취소하시겠습니까?")) {
                  setDraftData(null);
                  setDeletedClientIds([]);
                  setIsEditMode(false);
              }
          };

          const saveStructuralChanges = async () => {
              if (!isSupabaseConfigured) return;
              setLoading(true);
              try {
                  // 1. 삭제된 항목 DB 반영
                  if (deletedClientIds.length > 0) {
                      await supabase.from('clients').delete().in('id', deletedClientIds);
                  }

                  // 2. 추가/수정된 항목 (순서 포함) Upsert 준비
                  const clientsToUpsert = [];
                  draftData.forEach(div => {
                      div.categories.forEach(cat => {
                          cat.clients.forEach((cli, cliIdx) => {
                              clientsToUpsert.push({
                                  id: cli.id,
                                  category_id: cat.id,
                                  parent_id: null,
                                  name: cli.name,
                                  is_region: cli.isRegion || false,
                                  order_idx: cliIdx
                              });
                              if (cli.subClients) {
                                  cli.subClients.forEach((sub, subIdx) => {
                                      clientsToUpsert.push({
                                          id: sub.id,
                                          category_id: cat.id,
                                          parent_id: cli.id,
                                          name: sub.name,
                                          is_region: false,
                                          order_idx: subIdx
                                      });
                                  });
                              }
                          });
                      });
                  });

                  const { error } = await supabase.from('clients').upsert(clientsToUpsert);
                  if (error) throw error;

                  alert("항목 및 구조 변경이 저장되었습니다.");
                  await fetchSupabaseData(); // 최신 DB 상태로 동기화
                  setIsEditMode(false);
                  setDraftData(null);
                  setDeletedClientIds([]);
              } catch(e) {
                  console.error(e);
                  alert("구조 저장에 실패했습니다.");
              } finally {
                  setLoading(false);
              }
          };

          // --- 드래그 앤 드롭 핸들러 ---
          const handleDragStart = (e, item) => {
              if (!isEditMode) return;
              setDraggedItem(item);
              e.dataTransfer.effectAllowed = 'move';
              // Set a drag image or transparent image so the row visually drags
          };

          const handleDragOver = (e, targetItem) => {
              if (!isEditMode || !draggedItem) return;
              // 같은 부모를 공유하는 형제 요소끼리만 드롭 허용
              if (draggedItem.catId === targetItem.catId && draggedItem.parentId === targetItem.parentId) {
                  e.preventDefault();
                  setDropTarget(targetItem.id);
              }
          };

          const handleDrop = (e, targetItem) => {
              e.preventDefault();
              if (!isEditMode || !draggedItem) return;
              
              if (draggedItem.catId === targetItem.catId && draggedItem.parentId === targetItem.parentId && draggedItem.id !== targetItem.id) {
                  setDraftData(prev => {
                      const next = JSON.parse(JSON.stringify(prev));
                      for (const div of next) {
                          for (const cat of div.categories) {
                              if (cat.id === draggedItem.catId) {
                                  let list = draggedItem.parentId 
                                      ? cat.clients.find(c => c.id === draggedItem.parentId).subClients 
                                      : cat.clients;
                                  
                                  const oldIndex = list.findIndex(c => c.id === draggedItem.id);
                                  const newIndex = list.findIndex(c => c.id === targetItem.id);
                                  
                                  if (oldIndex > -1 && newIndex > -1) {
                                      const [removed] = list.splice(oldIndex, 1);
                                      list.splice(newIndex, 0, removed);
                                  }
                              }
                          }
                      }
                      return next;
                  });
              }
              setDraggedItem(null);
              setDropTarget(null);
          };

          const handleDragEnd = () => {
              setDraggedItem(null);
              setDropTarget(null);
          };

          // --- 편집 모드 액션 (Draft 조작) ---
          const updateClientName = (catId, clientId, parentId, newName) => {
              setDraftData(prev => {
                  const next = JSON.parse(JSON.stringify(prev));
                  for (const div of next) {
                      for (const cat of div.categories) {
                          if (cat.id === catId) {
                              if (parentId) {
                                  const parent = cat.clients.find(c => c.id === parentId);
                                  if (parent) {
                                      const sub = parent.subClients.find(c => c.id === clientId);
                                      if (sub) sub.name = newName;
                                  }
                              } else {
                                  const cli = cat.clients.find(c => c.id === clientId);
                                  if (cli) cli.name = newName;
                              }
                          }
                      }
                  }
                  return next;
              });
          };

          const handleAddClient = (catId, isRegion = false) => {
              const newId = `c_${Date.now()}_${Math.floor(Math.random()*1000)}`;
              setDraftData(prev => {
                  const next = JSON.parse(JSON.stringify(prev));
                  for (const div of next) {
                      for (const cat of div.categories) {
                          if (cat.id === catId) {
                              cat.clients.push({
                                  id: newId,
                                  name: isRegion ? '[ 새 지역/그룹 ]' : '새 거래처',
                                  isRegion: isRegion,
                                  isNew: true, // 식별용 플래그
                                  data: {},
                                  subClients: []
                              });
                          }
                      }
                  }
                  return next;
              });
              if(!expandedCats.includes(catId)) toggleCat(catId);
          };

          const handleAddSubClient = (catId, clientId) => {
              const newId = `c_${Date.now()}_${Math.floor(Math.random()*1000)}`;
              setDraftData(prev => {
                  const next = JSON.parse(JSON.stringify(prev));
                  for (const div of next) {
                      for (const cat of div.categories) {
                          if (cat.id === catId) {
                              const cli = cat.clients.find(c => c.id === clientId);
                              if (cli) {
                                  cli.subClients = cli.subClients || [];
                                  cli.subClients.push({
                                      id: newId,
                                      name: '새 세부 항목',
                                      isRegion: false,
                                      isNew: true,
                                      data: {}
                                  });
                              }
                          }
                      }
                  }
                  return next;
              });
              if(!expandedClients.includes(clientId)) toggleClient(clientId);
          };

          const handleDeleteClient = (catId, clientId, parentId = null) => {
              if(!confirm("이 항목을 삭제하시겠습니까?\n하위 항목 및 실적 데이터도 함께 삭제됩니다.")) return;
              
              setDeletedClientIds(prev => [...prev, clientId]);
              setDraftData(prev => {
                  const next = JSON.parse(JSON.stringify(prev));
                  for (const div of next) {
                      for (const cat of div.categories) {
                          if (cat.id === catId) {
                              if (parentId) {
                                  const parent = cat.clients.find(c => c.id === parentId);
                                  if (parent) {
                                      parent.subClients = parent.subClients.filter(c => c.id !== clientId);
                                  }
                              } else {
                                  const clientToDelete = cat.clients.find(c => c.id === clientId);
                                  if (clientToDelete && clientToDelete.subClients) {
                                      clientToDelete.subClients.forEach(sub => {
                                          setDeletedClientIds(prevIds => [...prevIds, sub.id]);
                                      });
                                  }
                                  cat.clients = cat.clients.filter(c => c.id !== clientId);
                              }
                          }
                      }
                  }
                  return next;
              });
          };

          // 숫자 데이터 실시간 저장
          const handleNumericDataSave = async (clientId, month, dataType, value) => {
             if (!isSupabaseConfigured) return;
             try {
                if (value === null) {
                    await supabase.from('monthly_data').delete().match({ client_id: clientId, month, data_type: dataType });
                } else {
                    await supabase.from('monthly_data').upsert({
                        client_id: clientId, month: parseInt(month), data_type: dataType, value: value
                    }, { onConflict: 'client_id,month,data_type' });
                }
                
                // 로컬 상태 동기화 (draftData나 dbData 양쪽 모두)
                const updateLocalData = (data) => {
                    const next = JSON.parse(JSON.stringify(data));
                    for (const div of next) {
                        for (const cat of div.categories) {
                            for (const cli of cat.clients) {
                                if (cli.id === clientId) {
                                    if(cat.type==='simple') cli.data[month] = value;
                                    else cli.data[dataType][month] = value;
                                }
                                if (cli.subClients) {
                                    for (const sub of cli.subClients) {
                                        if (sub.id === clientId) {
                                            if(cat.type==='simple') sub.data[month] = value;
                                            else sub.data[dataType][month] = value;
                                        }
                                    }
                                }
                            }
                        }
                    }
                    return next;
                };

                if (isEditMode) setDraftData(prev => updateLocalData(prev));
                else setDbData(prev => updateLocalData(prev));

             } catch(e) { console.error(e); alert("데이터 저장 실패"); }
          };

          const toggleCat = (catId) => setExpandedCats(prev => prev.includes(catId) ? prev.filter(id => id !== catId) : [...prev, catId]);
          const toggleClient = (clientId) => setExpandedClients(prev => prev.includes(clientId) ? prev.filter(id => id !== clientId) : [...prev, clientId]);

          // --- 뷰 계산 로직 ---
          const checkHasData = (dataObj, type) => {
              if (!dataObj) return false;
              if (type === 'simple') return Object.keys(dataObj).length > 0;
              return (dataObj.contract && Object.keys(dataObj.contract).length > 0) || (dataObj.po && Object.keys(dataObj.po).length > 0) || (dataObj.shipment && Object.keys(dataObj.shipment).length > 0);
          };

          const getDisplayClients = (clients, catType) => {
              if (isEditMode) return clients; // 편집 모드일 땐 실적 여부 관계없이 전체 노출
              
              const activeClients = [];
              let pendingRegion = null;
              clients.forEach(cli => {
                  if (cli.isRegion) { pendingRegion = cli; } 
                  else {
                      const activeSubs = (cli.subClients || []).filter(sub => checkHasData(sub.data, catType));
                      const clientHasData = checkHasData(cli.data, catType);
                      if (clientHasData || activeSubs.length > 0) {
                          if (pendingRegion) { activeClients.push(pendingRegion); pendingRegion = null; }
                          activeClients.push({ ...cli, subClients: activeSubs });
                      }
                  }
              });
              return activeClients;
          };

          const getCatMonthlyTotal = (cat, month) => {
            if (!cat.clients || cat.clients.length === 0) return 0;
            if (cat.type === 'simple') {
              return cat.clients.reduce((sum, client) => {
                if (client.isRegion) return sum;
                if (client.subClients && client.subClients.length > 0) return sum + client.subClients.reduce((subSum, sub) => subSum + (sub.data?.[month] || 0), 0);
                return sum + (client.data?.[month] || 0);
              }, 0);
            } else {
              return cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data?.shipment?.[month] || 0)), 0);
            }
          };

          const getClientMonthlyTotal = (client, month, type = 'simple') => {
            if (type === 'simple') {
              if (client.subClients && client.subClients.length > 0) return client.subClients.reduce((sum, sub) => sum + (sub.data?.[month] || 0), 0);
              return client.data?.[month] || 0;
            } else {
               return client.data?.shipment?.[month] || 0;
            }
          };

          const calculateDivisionRowSpan = (division) => {
              let span = 0;
              division.categories.forEach(cat => {
                  span += 1;
                  const displayClients = getDisplayClients(cat.clients, cat.type);
                  if (expandedCats.includes(cat.id)) {
                      displayClients.forEach(client => {
                          span += 1;
                          if (!client.isRegion) {
                              const hasSubClients = client.subClients && client.subClients.length > 0;
                              const isClientExpanded = expandedClients.includes(client.id);
                              if (cat.type === 'simple') {
                                  if (hasSubClients && isClientExpanded) span += client.subClients.length;
                              } else if (cat.type === 'pipeline') {
                                  if (hasSubClients && isClientExpanded) {
                                      client.subClients.forEach(sub => {
                                          span += 1;
                                          if (expandedClients.includes(sub.id)) span += 3;
                                      });
                                  } else if (!hasSubClients && isClientExpanded) {
                                      span += 3;
                                  }
                              }
                          }
                      });
                  }
              });
              return span;
          };

          const totals = useMemo(() => {
            let contractTotals = { monthly: {}, q2to4: 0 };
            let poTotals = { monthly: {}, q2to4: 0 };
            let shipmentTotals = { monthly: {}, q2to4: 0 };
            allMonths.forEach(m => { contractTotals.monthly[m] = 0; poTotals.monthly[m] = 0; shipmentTotals.monthly[m] = 0; });

            currentData.forEach(div => {
              div.categories.forEach(cat => {
                allMonths.forEach(m => {
                  if (cat.type === 'simple') {
                    const val = getCatMonthlyTotal(cat, m);
                    contractTotals.monthly[m] += val; poTotals.monthly[m] += val; shipmentTotals.monthly[m] += val;
                    contractTotals.q2to4 += val; poTotals.q2to4 += val; shipmentTotals.q2to4 += val;
                  } else if (cat.type === 'pipeline') {
                    const cVal = cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data?.contract?.[m] || 0)), 0);
                    const pVal = cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data?.po?.[m] || 0)), 0);
                    const sVal = getCatMonthlyTotal(cat, m);
                    contractTotals.monthly[m] += cVal; poTotals.monthly[m] += pVal; shipmentTotals.monthly[m] += sVal;
                    contractTotals.q2to4 += cVal; poTotals.q2to4 += pVal; shipmentTotals.q2to4 += sVal;
                  }
                });
              });
            });
            return { contract: contractTotals, po: poTotals, shipment: shipmentTotals };
          }, [currentData]);

          if (loading && !isEditMode) return <div className="min-h-screen flex items-center justify-center font-bold text-gray-500">데이터를 불러오는 중입니다...</div>;

          return (
            <div className="min-h-screen p-4 font-sans text-gray-800 break-keep">
              <div className="max-w-[1400px] mx-auto space-y-4">
                
                {/* Header Section */}
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-4">
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2 tracking-tight">
                      <TrendingUp className="text-blue-600" size={28} />
                      전사 영업/생산 통합 관리 보드
                    </h1>
                    <p className="text-gray-500 mt-1 text-sm">
                      매출 계획 및 선행지표 트래킹 <span className="font-semibold text-gray-700 whitespace-nowrap">[단위: 억 원]</span>
                    </p>
                  </div>

                  {/* 관리자 컨트롤 영역 */}
                  <div className="flex flex-wrap gap-2 items-center">
                      {isEditMode ? (
                          <>
                              <button onClick={saveStructuralChanges} className="px-5 py-2.5 text-sm font-bold rounded-lg bg-red-500 text-white shadow-lg shadow-red-200 hover:bg-red-600 flex items-center gap-2 transition-all">
                                  <Save size={18} /> 변경사항 저장
                              </button>
                              <button onClick={cancelEditMode} className="px-4 py-2 text-sm font-bold rounded-lg bg-gray-200 text-gray-700 hover:bg-gray-300 transition-all">
                                  취소
                              </button>
                          </>
                      ) : (
                          <button onClick={startEditMode} className="px-4 py-2.5 text-sm font-bold rounded-lg bg-gray-800 text-white hover:bg-gray-700 flex items-center gap-2 transition-all shadow-md">
                              <Edit2 size={16} /> 관리자 편집 모드
                          </button>
                      )}
                  </div>
                </div>

                {isEditMode && (
                    <div className="bg-red-50 text-red-700 p-3.5 rounded-lg border border-red-200 text-sm font-medium flex items-start gap-2">
                        <Info size={18} className="shrink-0 mt-0.5" />
                        <span>항목을 <b>드래그 앤 드롭</b>하여 순서를 변경하거나 <b>추가/수정/삭제</b> 하세요. 새로운 거래처의 실적 입력은 우측 상단의 <b>[변경사항 저장]</b>을 완료한 이후부터 가능합니다.</span>
                    </div>
                )}

                {/* Main Table */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto relative">
                  {loading && isEditMode && (
                      <div className="absolute inset-0 bg-white/60 z-10 flex items-center justify-center backdrop-blur-sm">
                          <span className="font-bold text-lg text-blue-600">저장 중...</span>
                      </div>
                  )}

                  <table className="w-full text-left border-collapse min-w-[1200px] keep-all">
                    <thead>
                      <tr className="bg-slate-100 text-slate-700 text-sm border-b border-gray-300">
                        <th colSpan="2" className="p-3 font-bold border-r border-gray-300 text-center whitespace-nowrap">구분</th>
                        <th 
                          className="p-3 font-bold border-r border-gray-300 text-center bg-blue-50 cursor-pointer hover:bg-blue-100 transition-colors w-[5.5rem]" 
                          onClick={() => setShowSubtotals(!showSubtotals)}
                          title="소계 숨기기/펼치기"
                        >
                          <div className="flex items-center justify-center gap-1 text-blue-800 whitespace-nowrap">
                            합계
                            {showSubtotals ? <ChevronLeft size={16} className="text-blue-600 shrink-0" /> : <ChevronRight size={16} className="text-blue-600 shrink-0" />}
                          </div>
                        </th>
                        {showSubtotals && <th className="p-3 font-bold border-r border-gray-300 text-center w-[5.5rem] bg-slate-50 whitespace-nowrap">1Q</th>}
                        {showSubtotals && <th className="p-3 font-bold border-r border-gray-300 text-center w-[5.5rem] bg-slate-50 whitespace-nowrap">2Q - 4Q</th>}
                        {quarters.map(q => (
                          <th key={q.name} colSpan="3" className="p-2 text-center font-bold border-r border-gray-300 last:border-0 bg-slate-200 whitespace-nowrap">
                            {q.name}
                          </th>
                        ))}
                      </tr>
                      <tr className="bg-slate-50 text-slate-600 text-xs border-b border-gray-300">
                        <th className="p-2 w-24 border-r border-gray-300 text-center whitespace-nowrap">사업부</th>
                        <th className="p-2 min-w-[15rem] border-r border-gray-300 text-center keep-all">세부항목</th>
                        <th className="p-2 border-r border-gray-300 text-center text-[10px] font-normal text-gray-500 bg-blue-50/30 whitespace-nowrap leading-tight">연간<br/>총계</th>
                        {showSubtotals && <th className="p-2 border-r border-gray-300 text-center text-[10px] font-normal text-gray-400 leading-tight whitespace-nowrap">실적<br/>(확정)</th>}
                        {showSubtotals && <th className="p-2 border-r border-gray-300 text-center text-[10px] font-normal text-gray-400 leading-tight whitespace-nowrap">누적<br/>예상</th>}
                        {quarters.map((q, qIndex) => (
                          q.months.map((m, mIndex) => (
                            <th key={m} className={`p-2 text-center w-[4.5rem] whitespace-nowrap ${mIndex === 2 && qIndex !== 2 ? 'border-r border-gray-300' : 'border-r border-gray-200'}`}>
                              {m}월
                            </th>
                          ))
                        ))}
                      </tr>
                    </thead>
                    <tbody className="text-sm">
                      {currentData.map((division) => {
                        const divisionRowSpan = calculateDivisionRowSpan(division);

                        return division.categories.map((cat, catIndex) => {
                          const isFirstCat = catIndex === 0;
                          let rowTotal2_4Q = 0;
                          allMonths.forEach(m => { rowTotal2_4Q += getCatMonthlyTotal(cat, m); });

                          const displayClients = getDisplayClients(cat.clients, cat.type);
                          const hasDisplayClients = displayClients.length > 0 || isEditMode;

                          return (
                            <React.Fragment key={cat.id}>
                              {/* Category Main Row */}
                              <tr className="border-b border-gray-200 hover:bg-gray-50 transition-colors">
                                {isFirstCat && (
                                  <td rowSpan={divisionRowSpan} className={`${division.color} border-b border-r ${division.colorBorder} text-center font-bold text-gray-800 align-middle text-base tracking-widest whitespace-nowrap`}>
                                    {division.name}
                                  </td>
                                )}
                                <td className="p-2.5 border-r border-gray-200 text-gray-700 relative group">
                                  <div 
                                    className={`font-bold flex items-center justify-between ${hasDisplayClients ? 'cursor-pointer text-gray-900' : 'text-gray-500'} ${isEditMode ? 'pr-20' : ''}`}
                                    onClick={() => hasDisplayClients && toggleCat(cat.id)}
                                  >
                                    <span className="keep-all">
                                      {cat.name}
                                    </span>
                                    {hasDisplayClients && (
                                      expandedCats.includes(cat.id) ? <ChevronDown size={16} className="text-gray-400 shrink-0"/> : <ChevronRight size={16} className="text-gray-400 shrink-0"/>
                                    )}
                                  </div>

                                  {/* 카테고리 레벨 버튼 (거래처 추가) */}
                                  {isEditMode && (
                                      <div className="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1 bg-white p-0.5 rounded shadow-sm border border-gray-200 z-10">
                                          <button onClick={(e) => { e.stopPropagation(); handleAddClient(cat.id, false); }} title="항목 추가" className="p-1 text-blue-600 rounded hover:bg-blue-50">
                                              <Plus size={16}/>
                                          </button>
                                          {cat.id === 'g-wholesale' && (
                                              <button onClick={(e) => { e.stopPropagation(); handleAddClient(cat.id, true); }} title="지역 추가" className="text-xs bg-teal-50 text-teal-700 px-1.5 py-1 rounded hover:bg-teal-100 flex items-center">
                                                  지역추가
                                              </button>
                                          )}
                                      </div>
                                  )}
                                </td>
                                <td className="p-2 border-r border-gray-200 text-center font-bold text-blue-800 bg-blue-50/20">
                                  {rowTotal2_4Q > 0 ? rowTotal2_4Q.toFixed(1).replace('.0', '') : '-'}
                                </td>
                                {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                {showSubtotals && <td className="p-2 border-r border-gray-200 text-center font-semibold text-gray-800 bg-gray-50/50">
                                  {rowTotal2_4Q > 0 ? rowTotal2_4Q.toFixed(1).replace('.0', '') : '-'}
                                </td>}
                                {allMonths.map((m, mIndex) => {
                                  const totalVal = getCatMonthlyTotal(cat, m);
                                  const isQEnd = mIndex === 2 || mIndex === 5;
                                  let styles = cat.type === 'simple' ? "font-semibold text-gray-800" : "font-bold text-emerald-700 bg-emerald-50/50";
                                  return (
                                    <td key={m} className={`p-1 align-middle border-r ${isQEnd ? 'border-gray-300' : 'border-gray-100'}`}>
                                      {totalVal > 0 ? <div className={`text-center ${styles}`}>{totalVal.toFixed(1).replace('.0', '')}</div> : null}
                                    </td>
                                  );
                                })}
                              </tr>

                              {/* Expanded Simple Items (Non-ODM) */}
                              {cat.type === 'simple' && expandedCats.includes(cat.id) && displayClients.map((client, cliIdx) => {
                                if (client.isRegion) {
                                  return (
                                    <tr key={client.id} 
                                        draggable={isEditMode}
                                        onDragStart={(e) => handleDragStart(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDragOver={(e) => handleDragOver(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDrop={(e) => handleDrop(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDragEnd={handleDragEnd}
                                        className={`border-b border-gray-100 bg-teal-50/60 relative ${dropTarget === client.id ? 'border-t-2 border-t-blue-500 bg-blue-50/80 shadow-[inset_0_2px_0_rgba(59,130,246,0.5)]' : ''}`}
                                    >
                                      <td className={`p-1.5 border-r border-gray-200 text-xs font-bold text-teal-800 pl-4 keep-all ${isEditMode ? 'pr-20' : ''}`}>
                                        {isEditMode ? (
                                            <input 
                                                value={client.name} 
                                                onChange={e => updateClientName(cat.id, client.id, null, e.target.value)}
                                                className="w-full bg-transparent border-b border-teal-300 focus:border-teal-600 outline-none placeholder-teal-300 font-bold cursor-text"
                                            />
                                        ) : client.name}

                                        {isEditMode && (
                                            <div className="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-0.5 bg-white p-0.5 rounded shadow-sm border border-gray-200 z-10">
                                              <div className="p-1 text-gray-400 cursor-grab hover:text-gray-700" title="드래그하여 순서 변경"><GripVertical size={14}/></div>
                                              <button onClick={() => handleDeleteClient(cat.id, client.id, null)} title="삭제" className="p-1 hover:bg-red-50 text-red-500 rounded"><Trash size={14}/></button>
                                            </div>
                                        )}
                                      </td>
                                      <td className="border-r border-gray-200"></td>
                                      {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                      {showSubtotals && <td className="border-r border-gray-200"></td>}
                                      {allMonths.map((m, mIndex) => <td key={`reg-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'}`}></td>)}
                                    </tr>
                                  );
                                }
                                
                                const hasSubClients = client.subClients && client.subClients.length > 0;
                                const isClientExpanded = expandedClients.includes(client.id);
                                const cTotal = allMonths.reduce((sum, m) => sum + getClientMonthlyTotal(client, m, 'simple'), 0);

                                return (
                                  <React.Fragment key={client.id}>
                                    <tr draggable={isEditMode}
                                        onDragStart={(e) => handleDragStart(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDragOver={(e) => handleDragOver(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDrop={(e) => handleDrop(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDragEnd={handleDragEnd}
                                        className={`border-b border-gray-100 bg-slate-50/40 hover:bg-slate-100 transition-colors relative ${dropTarget === client.id ? 'border-t-2 border-t-blue-500 bg-blue-50/80 shadow-[inset_0_2px_0_rgba(59,130,246,0.5)]' : ''}`}
                                    >
                                      <td className={`p-2 border-r border-gray-200 text-sm pl-8 ${hasSubClients ? 'cursor-pointer' : ''} ${isEditMode ? 'pr-[5.5rem]' : ''}`} onClick={() => hasSubClients && toggleClient(client.id)}>
                                        <div className="flex items-center gap-1.5 w-full">
                                          {hasSubClients && (isClientExpanded ? <ChevronDown size={14} className="text-gray-400 shrink-0"/> : <ChevronRight size={14} className="text-gray-400 shrink-0"/>)}
                                          {!hasSubClients && <span className="w-3.5 inline-block shrink-0"></span>}
                                          <span className="shrink-0 font-medium">└</span>
                                          {isEditMode ? (
                                              <input 
                                                  value={client.name} 
                                                  onChange={e => updateClientName(cat.id, client.id, null, e.target.value)}
                                                  onClick={e => e.stopPropagation()}
                                                  className={`w-full bg-transparent border-b cursor-text ${client.isNew ? 'border-blue-400 text-blue-700 font-bold bg-blue-50/50' : 'border-gray-300 focus:border-blue-500'} outline-none`}
                                              />
                                          ) : (
                                              <span className={`font-medium keep-all ${client.isNew ? 'text-blue-600' : 'text-gray-700'}`}>{client.name}</span>
                                          )}
                                        </div>

                                        {isEditMode && (
                                            <div className="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-0.5 bg-white p-0.5 rounded shadow-sm border border-gray-200 z-10" onClick={e=>e.stopPropagation()}>
                                              <div className="p-1 text-gray-400 cursor-grab hover:text-gray-700" title="드래그하여 순서 변경"><GripVertical size={14}/></div>
                                              <button onClick={() => handleAddSubClient(cat.id, client.id)} title="하위 항목 추가" className="p-1 hover:bg-blue-50 text-blue-600 rounded"><Plus size={14}/></button>
                                              <button onClick={() => handleDeleteClient(cat.id, client.id, null)} title="삭제" className="p-1 hover:bg-red-50 text-red-500 rounded"><Trash size={14}/></button>
                                            </div>
                                        )}
                                      </td>
                                      <td className="p-2 border-r border-gray-200 text-center text-gray-700 font-medium bg-slate-50/50">
                                        {cTotal > 0 ? cTotal.toFixed(1).replace('.0', '') : '-'}
                                      </td>
                                      {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                      {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-gray-600">
                                        {cTotal > 0 ? cTotal.toFixed(1).replace('.0', '') : '-'}
                                      </td>}
                                      {allMonths.map((m, mIndex) => {
                                        const isQEnd = mIndex === 2 || mIndex === 5;
                                        if (hasSubClients) {
                                            const cVal = getClientMonthlyTotal(client, m, 'simple');
                                            return <td key={`simple-c-${m}`} className={`p-1 border-r ${isQEnd ? 'border-gray-300' : 'border-gray-100'} text-center text-gray-700`}>{cVal > 0 ? cVal.toFixed(1).replace('.0', '') : ''}</td>;
                                        }
                                        return (
                                          <td key={`simple-c-${m}`} className={`p-1 border-r ${isQEnd ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                            <EditableCell 
                                                value={client.data?.[m]} 
                                                isEditMode={isEditMode} 
                                                isNew={client.isNew}
                                                onSave={(val) => handleNumericDataSave(client.id, m, 'simple', val)} 
                                                baseClass="text-gray-700 font-medium" 
                                            />
                                          </td>
                                        );
                                      })}
                                    </tr>
                                    
                                    {/* SubClients */}
                                    {hasSubClients && isClientExpanded && client.subClients.map(sub => {
                                      const subTotal = allMonths.reduce((sum, m) => sum + getClientMonthlyTotal(sub, m, 'simple'), 0);
                                      return (
                                      <tr key={sub.id} 
                                          draggable={isEditMode}
                                          onDragStart={(e) => handleDragStart(e, { id: sub.id, catId: cat.id, parentId: client.id })}
                                          onDragOver={(e) => handleDragOver(e, { id: sub.id, catId: cat.id, parentId: client.id })}
                                          onDrop={(e) => handleDrop(e, { id: sub.id, catId: cat.id, parentId: client.id })}
                                          onDragEnd={handleDragEnd}
                                          className={`border-b border-gray-50 bg-white hover:bg-slate-50 transition-colors relative ${dropTarget === sub.id ? 'border-t-2 border-t-blue-500 bg-blue-50/80 shadow-[inset_0_2px_0_rgba(59,130,246,0.5)]' : ''}`}
                                      >
                                         <td className={`p-1.5 border-r border-gray-200 text-xs pl-14 flex items-center gap-1.5 ${isEditMode ? 'pr-20' : ''}`}>
                                           <span className="shrink-0 text-gray-400">-</span>
                                           {isEditMode ? (
                                                <input 
                                                    value={sub.name} 
                                                    onChange={e => updateClientName(cat.id, sub.id, client.id, e.target.value)}
                                                    className={`w-full bg-transparent border-b cursor-text ${sub.isNew ? 'border-blue-400 text-blue-700 bg-blue-50/50' : 'border-gray-300 focus:border-blue-500'} outline-none`}
                                                />
                                            ) : (
                                                <span className={`keep-all ${sub.isNew ? 'text-blue-600' : 'text-gray-500'}`}>{sub.name}</span>
                                            )}

                                            {isEditMode && (
                                                <div className="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-0.5 bg-white p-0.5 rounded shadow-sm border border-gray-200 z-10">
                                                  <div className="p-1 text-gray-400 cursor-grab hover:text-gray-700" title="드래그하여 순서 변경"><GripVertical size={14}/></div>
                                                  <button onClick={() => handleDeleteClient(cat.id, sub.id, client.id)} title="삭제" className="p-1 hover:bg-red-50 text-red-500 rounded"><Trash size={14}/></button>
                                                </div>
                                            )}
                                         </td>
                                         <td className="p-2 border-r border-gray-200 text-center text-gray-600 font-medium bg-slate-50/50">
                                           {subTotal > 0 ? subTotal.toFixed(1).replace('.0', '') : '-'}
                                         </td>
                                         {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                         {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-gray-500">
                                           {subTotal > 0 ? subTotal.toFixed(1).replace('.0', '') : '-'}
                                         </td>}
                                         {allMonths.map((m, mIndex) => (
                                           <td key={`simple-sub-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                             <EditableCell 
                                                value={sub.data?.[m]} 
                                                isEditMode={isEditMode} 
                                                isNew={sub.isNew}
                                                onSave={(val) => handleNumericDataSave(sub.id, m, 'simple', val)} 
                                                baseClass="text-gray-600" 
                                            />
                                           </td>
                                         ))}
                                      </tr>
                                    )})}
                                  </React.Fragment>
                                );
                              })}

                              {/* Expanded Pipeline Items (ODM) */}
                              {cat.type === 'pipeline' && expandedCats.includes(cat.id) && displayClients.map(client => {
                                const hasSubClients = client.subClients && client.subClients.length > 0;
                                const isClientExpanded = expandedClients.includes(client.id);
                                const pipeClientTotal = allMonths.reduce((sum, m) => sum + (client.data?.shipment?.[m] || 0), 0);

                                return (
                                  <React.Fragment key={client.id}>
                                    <tr draggable={isEditMode}
                                        onDragStart={(e) => handleDragStart(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDragOver={(e) => handleDragOver(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDrop={(e) => handleDrop(e, { id: client.id, catId: cat.id, parentId: null })}
                                        onDragEnd={handleDragEnd}
                                        className={`border-b border-gray-100 bg-slate-50/40 hover:bg-slate-100 transition-colors relative ${dropTarget === client.id ? 'border-t-2 border-t-blue-500 bg-blue-50/80 shadow-[inset_0_2px_0_rgba(59,130,246,0.5)]' : ''}`}
                                    >
                                      <td className={`p-2 border-r border-gray-200 text-sm pl-6 cursor-pointer ${isEditMode ? 'pr-[5.5rem]' : ''}`} onClick={() => toggleClient(client.id)}>
                                        <div className="flex items-center gap-1.5 w-full">
                                          {isClientExpanded ? <ChevronDown size={14} className="text-gray-400 shrink-0"/> : <ChevronRight size={14} className="text-gray-400 shrink-0"/>}
                                          <span className="shrink-0 font-medium">└</span>
                                          {isEditMode ? (
                                              <input 
                                                  value={client.name} 
                                                  onChange={e => updateClientName(cat.id, client.id, null, e.target.value)}
                                                  onClick={e => e.stopPropagation()}
                                                  className={`w-full bg-transparent border-b cursor-text ${client.isNew ? 'border-blue-400 text-blue-700 font-bold bg-blue-50/50' : 'border-gray-300 focus:border-blue-500'} outline-none`}
                                              />
                                          ) : (
                                              <span className={`font-medium keep-all ${client.isNew ? 'text-blue-600' : 'text-gray-700'}`}>{client.name}</span>
                                          )}
                                        </div>

                                        {isEditMode && (
                                            <div className="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-0.5 bg-white p-0.5 rounded shadow-sm border border-gray-200 z-10" onClick={e=>e.stopPropagation()}>
                                              <div className="p-1 text-gray-400 cursor-grab hover:text-gray-700" title="드래그하여 순서 변경"><GripVertical size={14}/></div>
                                              <button onClick={() => handleAddSubClient(cat.id, client.id)} title="하위 항목 추가" className="p-1 hover:bg-blue-50 text-blue-600 rounded"><Plus size={14}/></button>
                                              <button onClick={() => handleDeleteClient(cat.id, client.id, null)} title="삭제" className="p-1 hover:bg-red-50 text-red-500 rounded"><Trash size={14}/></button>
                                            </div>
                                        )}
                                      </td>
                                      <td className="p-2 border-r border-gray-200 text-center font-bold text-emerald-700 bg-emerald-50/30">
                                        {pipeClientTotal > 0 ? pipeClientTotal.toFixed(1).replace('.0','') : '-'}
                                      </td>
                                      {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                      {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-emerald-600">
                                        {pipeClientTotal > 0 && (!isClientExpanded || hasSubClients) ? pipeClientTotal.toFixed(1).replace('.0','') : '-'}
                                      </td>}
                                      {allMonths.map((m, mIndex) => (
                                        <td key={`client-s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                          {(!isClientExpanded || hasSubClients) && <div className="mx-auto w-10 py-0.5 rounded text-xs border border-opacity-40 shadow-sm bg-emerald-50 text-emerald-700 font-bold border-emerald-300">{client.data?.shipment?.[m] ? client.data.shipment[m].toFixed(1).replace('.0','') : ''}</div>}
                                        </td>
                                      ))}
                                    </tr>

                                    {/* With SubClients */}
                                    {hasSubClients && isClientExpanded && client.subClients.map(sub => {
                                      const isSubExpanded = expandedClients.includes(sub.id);
                                      const pipeSubTotal = allMonths.reduce((sum, m) => sum + (sub.data?.shipment?.[m] || 0), 0);
                                      
                                      const cContract = getStageTotal(sub.data, 'contract', allMonths);
                                      const cPo = getStageTotal(sub.data, 'po', allMonths);
                                      const cShip = getStageTotal(sub.data, 'shipment', allMonths);

                                      return (
                                        <React.Fragment key={sub.id}>
                                          <tr draggable={isEditMode}
                                              onDragStart={(e) => handleDragStart(e, { id: sub.id, catId: cat.id, parentId: client.id })}
                                              onDragOver={(e) => handleDragOver(e, { id: sub.id, catId: cat.id, parentId: client.id })}
                                              onDrop={(e) => handleDrop(e, { id: sub.id, catId: cat.id, parentId: client.id })}
                                              onDragEnd={handleDragEnd}
                                              className={`border-b border-gray-50 bg-white hover:bg-slate-50 transition-colors relative ${dropTarget === sub.id ? 'border-t-2 border-t-blue-500 bg-blue-50/80 shadow-[inset_0_2px_0_rgba(59,130,246,0.5)]' : ''}`}
                                          >
                                            <td className={`p-1.5 border-r border-gray-200 text-xs pl-12 cursor-pointer ${isEditMode ? 'pr-20' : ''}`} onClick={() => toggleClient(sub.id)}>
                                              <div className="flex items-center gap-1.5 w-full">
                                                {isSubExpanded ? <ChevronDown size={12} className="text-gray-400 shrink-0"/> : <ChevronRight size={12} className="text-gray-400 shrink-0"/>}
                                                <span className="shrink-0 text-gray-500">-</span>
                                                {isEditMode ? (
                                                    <input 
                                                        value={sub.name} 
                                                        onChange={e => updateClientName(cat.id, sub.id, client.id, e.target.value)}
                                                        onClick={e => e.stopPropagation()}
                                                        className={`w-full bg-transparent border-b cursor-text ${sub.isNew ? 'border-blue-400 text-blue-700 bg-blue-50/50' : 'border-gray-300 focus:border-blue-500'} outline-none`}
                                                    />
                                                ) : (
                                                    <span className={`font-medium keep-all ${sub.isNew ? 'text-blue-600' : 'text-gray-700'}`}>{sub.name}</span>
                                                )}
                                              </div>

                                              {isEditMode && (
                                                <div className="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-0.5 bg-white p-0.5 rounded shadow-sm border border-gray-200 z-10" onClick={e=>e.stopPropagation()}>
                                                    <div className="p-1 text-gray-400 cursor-grab hover:text-gray-700" title="드래그하여 순서 변경"><GripVertical size={14}/></div>
                                                    <button onClick={() => handleDeleteClient(cat.id, sub.id, client.id)} title="삭제" className="p-1 hover:bg-red-50 text-red-500 rounded"><Trash size={14}/></button>
                                                </div>
                                              )}
                                            </td>
                                            <td className="p-2 border-r border-gray-200 text-center font-bold text-emerald-700 bg-emerald-50/20">
                                              {pipeSubTotal > 0 ? pipeSubTotal.toFixed(1).replace('.0','') : '-'}
                                            </td>
                                            {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                            {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-emerald-600">
                                              {pipeSubTotal > 0 && !isSubExpanded ? pipeSubTotal.toFixed(1).replace('.0','') : '-'}
                                            </td>}
                                            {allMonths.map((m, mIndex) => (
                                              <td key={`sub-s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                                {!isSubExpanded && <div className="mx-auto w-10 py-0.5 rounded text-xs border border-opacity-40 shadow-sm bg-emerald-50 text-emerald-700 font-bold border-emerald-300">{sub.data?.shipment?.[m] ? sub.data.shipment[m].toFixed(1).replace('.0','') : ''}</div>}
                                              </td>
                                            ))}
                                          </tr>

                                          {/* 3-Stages */}
                                          {isSubExpanded && (
                                            <>
                                              <tr className="border-b border-gray-50 bg-slate-50/30">
                                                <td className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-16 flex items-center gap-1.5 whitespace-nowrap"><FileSignature size={12} className="text-blue-500 shrink-0"/> ① 계약</td>
                                                <td className="p-2 border-r border-gray-200 text-center font-semibold text-blue-700 bg-blue-50/30">
                                                  {cContract > 0 ? cContract.toFixed(1).replace('.0','') : '-'}
                                                </td>
                                                {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                                {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-blue-600 bg-blue-50/10">
                                                  {cContract > 0 ? cContract.toFixed(1).replace('.0','') : '-'}
                                                </td>}
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`c-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-blue-50/10`}>
                                                    <EditableCell value={sub.data?.contract?.[m]} isEditMode={isEditMode} isNew={sub.isNew} onSave={(val) => handleNumericDataSave(sub.id, m, 'contract', val)} baseClass="bg-blue-50 text-blue-700 font-medium border border-blue-200" />
                                                  </td>
                                                ))}
                                              </tr>
                                              <tr className="border-b border-gray-50 bg-slate-50/30">
                                                <td className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-16 flex items-center gap-1.5 whitespace-nowrap"><ShoppingCart size={12} className="text-purple-500 shrink-0"/> ② 발주</td>
                                                <td className="p-2 border-r border-gray-200 text-center font-semibold text-purple-700 bg-purple-50/30">
                                                  {cPo > 0 ? cPo.toFixed(1).replace('.0','') : '-'}
                                                </td>
                                                {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                                {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-purple-600 bg-purple-50/10">
                                                  {cPo > 0 ? cPo.toFixed(1).replace('.0','') : '-'}
                                                </td>}
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`p-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-purple-50/10`}>
                                                     <EditableCell value={sub.data?.po?.[m]} isEditMode={isEditMode} isNew={sub.isNew} onSave={(val) => handleNumericDataSave(sub.id, m, 'po', val)} baseClass="bg-purple-50 text-purple-700 font-medium border border-purple-200" />
                                                  </td>
                                                ))}
                                              </tr>
                                              <tr className="border-b border-gray-100 bg-slate-50/30">
                                                <td className="p-1.5 border-r border-gray-200 text-xs font-medium text-emerald-700 pl-16 flex items-center gap-1.5 whitespace-nowrap"><Truck size={12} className="text-emerald-500 shrink-0"/> ③ 출고</td>
                                                <td className="p-2 border-r border-gray-200 text-center font-semibold text-emerald-700 bg-emerald-50/30">
                                                  {cShip > 0 ? cShip.toFixed(1).replace('.0','') : '-'}
                                                </td>
                                                {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                                {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-emerald-600 bg-emerald-50/20">
                                                  {cShip > 0 ? cShip.toFixed(1).replace('.0','') : '-'}
                                                </td>}
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-emerald-50/20`}>
                                                    <EditableCell value={sub.data?.shipment?.[m]} isEditMode={isEditMode} isNew={sub.isNew} onSave={(val) => handleNumericDataSave(sub.id, m, 'shipment', val)} baseClass="bg-emerald-50 text-emerald-700 font-bold border border-emerald-300" />
                                                  </td>
                                                ))}
                                              </tr>
                                            </>
                                          )}
                                        </React.Fragment>
                                      );
                                    })}

                                    {/* Direct Company (No SubClients) */}
                                    {!hasSubClients && isClientExpanded && (() => {
                                      const cContract = getStageTotal(client.data, 'contract', allMonths);
                                      const cPo = getStageTotal(client.data, 'po', allMonths);
                                      const cShip = getStageTotal(client.data, 'shipment', allMonths);
                                      return (
                                      <>
                                        <tr className="border-b border-gray-50 bg-white">
                                          <td className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-12 flex items-center gap-1.5 whitespace-nowrap"><FileSignature size={12} className="text-blue-500 shrink-0"/> ① 계약</td>
                                          <td className="p-2 border-r border-gray-200 text-center font-semibold text-blue-700 bg-blue-50/30">
                                            {cContract > 0 ? cContract.toFixed(1).replace('.0','') : '-'}
                                          </td>
                                          {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                          {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-blue-600 bg-blue-50/10">
                                            {cContract > 0 ? cContract.toFixed(1).replace('.0','') : '-'}
                                          </td>}
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`c-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-blue-50/10`}>
                                              <EditableCell value={client.data?.contract?.[m]} isEditMode={isEditMode} isNew={client.isNew} onSave={(val) => handleNumericDataSave(client.id, m, 'contract', val)} baseClass="bg-blue-50 text-blue-700 font-medium border border-blue-200" />
                                            </td>
                                          ))}
                                        </tr>
                                        <tr className="border-b border-gray-50 bg-white">
                                          <td className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-12 flex items-center gap-1.5 whitespace-nowrap"><ShoppingCart size={12} className="text-purple-500 shrink-0"/> ② 발주</td>
                                          <td className="p-2 border-r border-gray-200 text-center font-semibold text-purple-700 bg-purple-50/30">
                                            {cPo > 0 ? cPo.toFixed(1).replace('.0','') : '-'}
                                          </td>
                                          {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                          {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-purple-600 bg-purple-50/10">
                                            {cPo > 0 ? cPo.toFixed(1).replace('.0','') : '-'}
                                          </td>}
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`p-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-purple-50/10`}>
                                              <EditableCell value={client.data?.po?.[m]} isEditMode={isEditMode} isNew={client.isNew} onSave={(val) => handleNumericDataSave(client.id, m, 'po', val)} baseClass="bg-purple-50 text-purple-700 font-medium border border-purple-200" />
                                            </td>
                                          ))}
                                        </tr>
                                        <tr className="border-b border-gray-200 bg-white">
                                          <td className="p-1.5 border-r border-gray-200 text-xs font-medium text-emerald-700 pl-12 flex items-center gap-1.5 whitespace-nowrap"><Truck size={12} className="text-emerald-500 shrink-0"/> ③ 출고</td>
                                          <td className="p-2 border-r border-gray-200 text-center font-semibold text-emerald-700 bg-emerald-50/30">
                                            {cShip > 0 ? cShip.toFixed(1).replace('.0','') : '-'}
                                          </td>
                                          {showSubtotals && <td className={`border-r border-gray-200 ${hatchedBg}`}></td>}
                                          {showSubtotals && <td className="p-2 border-r border-gray-200 text-center text-emerald-600 bg-emerald-50/20">
                                            {cShip > 0 ? cShip.toFixed(1).replace('.0','') : '-'}
                                          </td>}
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-emerald-50/20`}>
                                              <EditableCell value={client.data?.shipment?.[m]} isEditMode={isEditMode} isNew={client.isNew} onSave={(val) => handleNumericDataSave(client.id, m, 'shipment', val)} baseClass="bg-emerald-50 text-emerald-700 font-bold border border-emerald-300" />
                                            </td>
                                          ))}
                                        </tr>
                                      </>
                                    )})}
                                  </React.Fragment>
                                );
                              })}
                            </React.Fragment>
                          );
                        });

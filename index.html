        // 개별 셀 에디터 컴포넌트
        const EditableCell = ({ value, isEditMode, onSave, baseClass = "", editClass = "" }) => {
            const [val, setVal] = useState(value || '');

            useEffect(() => { setVal(value || ''); }, [value]);

            const handleBlur = () => {
                const numVal = parseFloat(val);
                const oldVal = parseFloat(value || 0);
                
                if (isNaN(numVal) && !val) {
                    if (value !== null && value !== undefined) onSave(null); // 삭제
                } else if (!isNaN(numVal) && numVal !== oldVal) {
                    onSave(numVal); // 수정
                } else {
                    setVal(value || ''); // 변경없음, 리셋
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.target.blur();
                }
            };

            if (isEditMode) {
                return (
                    <input 
                        type="number" 
                        value={val}
                        onChange={e => setVal(e.target.value)}
                        onBlur={handleBlur}
                        onKeyDown={handleKeyDown}
                        className={`w-12 text-center py-0.5 border-b-2 border-blue-500 bg-white focus:outline-none focus:bg-blue-50 focus:ring-1 ring-blue-200 text-xs shadow-inner rounded-sm transition-all ${editClass}`}
                        placeholder="-"
                        step="0.1"
                    />
                );
            }
            
            if (!value) return <span className="text-transparent">-</span>;
            return <div className={`mx-auto w-10 py-0.5 rounded text-xs ${baseClass}`}>{parseFloat(value).toFixed(1).replace('.0', '')}</div>;
        };


        function OdmDashboard() {
          const [dbData, setDbData] = useState([]);
          const [loading, setLoading] = useState(true);
          const [isEditMode, setIsEditMode] = useState(false);
          const [expandedCats, setExpandedCats] = useState(['m-odm', 'g-odm', 'g-wholesale']);
          const [expandedClients, setExpandedClients] = useState([]);

          // Supabase 데이터 패칭
          const fetchSupabaseData = async () => {
            if (!isSupabaseConfigured) {
               console.warn("Supabase URL이 설정되지 않아 로컬 데이터를 사용합니다.");
               setDbData(initialHardcodedData);
               setLoading(false);
               return;
            }

            try {
                setLoading(true);
                const { data: divs } = await supabase.from('divisions').select('*').order('order_idx');
                const { data: cats } = await supabase.from('categories').select('*').order('order_idx');
                const { data: clis } = await supabase.from('clients').select('*').order('order_idx');
                const { data: mData } = await supabase.from('monthly_data').select('*');

                if (!divs || divs.length === 0) {
                    setDbData([]);
                    setLoading(false);
                    return;
                }

                // 계층 구조 빌드
                const tree = divs.map(div => ({
                    ...div,
                    colorBorder: div.color_border,
                    categories: cats.filter(c => c.division_id === div.id).map(cat => {
                        const catClients = clis.filter(c => c.category_id === cat.id && !c.parent_id);
                        return {
                            ...cat,
                            clients: catClients.map(cli => {
                                const subClients = clis.filter(c => c.parent_id === cli.id);
                                
                                const populateData = (cId) => {
                                    const cData = mData.filter(m => m.client_id === cId);
                                    if (cat.type === 'simple') {
                                        const d = {};
                                        cData.forEach(m => d[m.month] = parseFloat(m.value));
                                        return d;
                                    } else {
                                        const d = { contract: {}, po: {}, shipment: {} };
                                        cData.forEach(m => {
                                            if(d[m.data_type]) d[m.data_type][m.month] = parseFloat(m.value);
                                        });
                                        return d;
                                    }
                                };

                                return {
                                    ...cli,
                                    isRegion: cli.is_region,
                                    data: cli.is_region ? null : populateData(cli.id),
                                    subClients: subClients.map(sub => ({
                                        ...sub,
                                        data: populateData(sub.id)
                                    }))
                                };
                            })
                        };
                    })
                }));

                setDbData(tree);
            } catch (error) {
                console.error("데이터 불러오기 실패:", error);
            } finally {
                setLoading(false);
            }
          };

          useEffect(() => {
            fetchSupabaseData();
          }, []);

          // 데이터 업데이트 (Upsert)
          const handleDataSave = async (clientId, month, dataType, value) => {
             if (!isSupabaseConfigured) {
                 alert("DB가 연결되지 않아 저장이 불가능합니다. 코드를 수정해주세요.");
                 return;
             }

             try {
                if (value === null) {
                    await supabase.from('monthly_data').delete().match({ client_id: clientId, month, data_type: dataType });
                } else {
                    const { error } = await supabase.from('monthly_data').upsert({
                        client_id: clientId,
                        month: parseInt(month),
                        data_type: dataType,
                        value: value
                    }, { onConflict: 'client_id,month,data_type' });
                    
                    if (error) throw error;
                }
                // 저장 후 전체 데이터 다시 불러오기 (낙관적 업데이트 대신 심플하게 처리)
                await fetchSupabaseData();
             } catch(e) {
                 console.error(e);
                 alert("데이터 저장에 실패했습니다.");
             }
          };

          // -------------------------------------------------------------
          // 초기 데이터 셋업 (최초 1회용)
          const setupInitialDatabase = async () => {
              if (!isSupabaseConfigured) return alert("Supabase URL 설정을 먼저 해주세요.");
              if (!confirm("기존 하드코딩된 데이터를 DB에 삽입하시겠습니까?")) return;

              setLoading(true);
              try {
                  const divRows = initialHardcodedData.map((d, i) => ({ id: d.id, name: d.name, color: d.color, color_border: d.colorBorder, order_idx: i }));
                  await supabase.from('divisions').upsert(divRows);

                  let catRows = []; let cliRows = []; let mDataRows = [];
                  initialHardcodedData.forEach(div => {
                      div.categories.forEach((cat, catIdx) => {
                          catRows.push({ id: cat.id, division_id: div.id, name: cat.name, type: cat.type, order_idx: catIdx });
                          cat.clients.forEach((cli, cliIdx) => {
                              cliRows.push({ id: cli.id, category_id: cat.id, parent_id: null, name: cli.name, is_region: cli.isRegion || false, order_idx: cliIdx });
                              if (!cli.isRegion && cli.data) {
                                  if (cat.type === 'simple') {
                                      Object.keys(cli.data).forEach(m => mDataRows.push({ client_id: cli.id, month: parseInt(m), data_type: 'simple', value: cli.data[m] }));
                                  } else {
                                      ['contract', 'po', 'shipment'].forEach(type => {
                                          if(cli.data[type]) Object.keys(cli.data[type]).forEach(m => mDataRows.push({ client_id: cli.id, month: parseInt(m), data_type: type, value: cli.data[type][m] }));
                                      });
                                  }
                              }
                              if (cli.subClients) {
                                  cli.subClients.forEach((sub, subIdx) => {
                                      cliRows.push({ id: sub.id, category_id: cat.id, parent_id: cli.id, name: sub.name, is_region: false, order_idx: subIdx });
                                      if (sub.data) {
                                          if (cat.type === 'simple') {
                                              Object.keys(sub.data).forEach(m => mDataRows.push({ client_id: sub.id, month: parseInt(m), data_type: 'simple', value: sub.data[m] }));
                                          } else {
                                              ['contract', 'po', 'shipment'].forEach(type => {
                                                  if(sub.data[type]) Object.keys(sub.data[type]).forEach(m => mDataRows.push({ client_id: sub.id, month: parseInt(m), data_type: type, value: sub.data[type][m] }));
                                              });
                                          }
                                      }
                                  });
                              }
                          });
                      });
                  });

                  await supabase.from('categories').upsert(catRows);
                  await supabase.from('clients').upsert(cliRows);
                  await supabase.from('monthly_data').upsert(mDataRows, { onConflict: 'client_id,month,data_type' });

                  alert("데이터베이스 초기 셋업 완료!");
                  fetchSupabaseData();
              } catch(e) {
                  console.error(e);
                  alert("초기화 중 오류가 발생했습니다.");
              } finally {
                  setLoading(false);
              }
          };
          // -------------------------------------------------------------

          const toggleCat = (catId) => setExpandedCats(prev => prev.includes(catId) ? prev.filter(id => id !== catId) : [...prev, catId]);
          const toggleClient = (clientId) => setExpandedClients(prev => prev.includes(clientId) ? prev.filter(id => id !== clientId) : [...prev, clientId]);

          // 합계 계산
          const getCatMonthlyTotal = (cat, month) => {
            if (!cat.clients || cat.clients.length === 0) return 0;
            if (cat.type === 'simple') {
              return cat.clients.reduce((sum, client) => {
                if (client.isRegion) return sum;
                if (client.subClients && client.subClients.length > 0) return sum + client.subClients.reduce((subSum, sub) => subSum + (sub.data[month] || 0), 0);
                return sum + (client.data[month] || 0);
              }, 0);
            } else {
              return cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data.shipment[month] || 0)), 0);
            }
          };

          const getClientMonthlyTotal = (client, month, type = 'simple') => {
            if (type === 'simple') {
              if (client.subClients && client.subClients.length > 0) return client.subClients.reduce((sum, sub) => sum + (sub.data[month] || 0), 0);
              return client.data[month] || 0;
            } else {
               return client.data.shipment[month] || 0;
            }
          };

          const totals = useMemo(() => {
            let contractTotals = { monthly: {}, q2to4: 0 };
            let poTotals = { monthly: {}, q2to4: 0 };
            let shipmentTotals = { monthly: {}, q2to4: 0 };
            allMonths.forEach(m => { contractTotals.monthly[m] = 0; poTotals.monthly[m] = 0; shipmentTotals.monthly[m] = 0; });

            dbData.forEach(div => {
              div.categories.forEach(cat => {
                allMonths.forEach(m => {
                  if (cat.type === 'simple') {
                    const val = getCatMonthlyTotal(cat, m);
                    contractTotals.monthly[m] += val; poTotals.monthly[m] += val; shipmentTotals.monthly[m] += val;
                    contractTotals.q2to4 += val; poTotals.q2to4 += val; shipmentTotals.q2to4 += val;
                  } else if (cat.type === 'pipeline') {
                    const cVal = cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data.contract[m] || 0)), 0);
                    const pVal = cat.clients.reduce((sum, client) => sum + (client.isRegion ? 0 : (client.data.po[m] || 0)), 0);
                    const sVal = getCatMonthlyTotal(cat, m);
                    contractTotals.monthly[m] += cVal; poTotals.monthly[m] += pVal; shipmentTotals.monthly[m] += sVal;
                    contractTotals.q2to4 += cVal; poTotals.q2to4 += pVal; shipmentTotals.q2to4 += sVal;
                  }
                });
              });
            });
            return { contract: contractTotals, po: poTotals, shipment: shipmentTotals };
          }, [dbData]);

          if (loading) return <div className="min-h-screen flex items-center justify-center font-bold text-gray-500">데이터를 불러오는 중입니다...</div>;

          return (
            <div className="min-h-screen p-4 font-sans text-gray-800">
              <div className="max-w-[1400px] mx-auto space-y-4">
                
                {/* Header Section */}
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-4">
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2 tracking-tight">
                      <TrendingUp className="text-blue-600" size={28} />
                      전사 영업/생산 통합 관리 보드
                    </h1>
                    <p className="text-gray-500 mt-1 text-sm">
                      매출 계획 및 ODM 선행지표 트래킹 <span className="font-semibold text-gray-700">[단위: 억 원]</span>
                    </p>
                  </div>

                  {/* 관리자 컨트롤 영역 */}
                  <div className="flex flex-wrap gap-2 items-center">
                      <button 
                         onClick={setupInitialDatabase}
                         className="px-3 py-1.5 text-xs bg-gray-800 text-white rounded hover:bg-gray-700 transition"
                      >
                        DB 초기 세팅 (최초 1회)
                      </button>
                      
                      <button 
                         onClick={() => setIsEditMode(!isEditMode)}
                         className={`px-4 py-2 text-sm font-bold rounded-lg flex items-center gap-2 transition-all ${isEditMode ? 'bg-red-500 text-white shadow-lg' : 'bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-300'}`}
                      >
                        <Save size={16} /> {isEditMode ? '수정 완료 (읽기 모드)' : '관리자 편집 모드'}
                      </button>
                  </div>
                </div>

                {isEditMode && (
                    <div className="bg-red-50 text-red-700 p-3 rounded-lg border border-red-200 text-sm font-medium animate-pulse">
                        ⚠️ 편집 모드 활성화됨: 숫자가 있는 셀을 클릭하여 값을 수정하고 Enter를 누르면 DB에 즉시 저장됩니다. 빈 칸으로 만들면 삭제됩니다.
                    </div>
                )}

                {/* Main Table */}
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[1200px]">
                    <thead>
                      <tr className="bg-slate-100 text-slate-700 text-sm border-b border-gray-300">
                        <th colSpan="2" className="p-3 font-bold border-r border-gray-300 text-center">구분</th>
                        <th className="p-3 font-bold border-r border-gray-300 text-center w-16">1Q 소계</th>
                        <th className="p-3 font-bold border-r border-gray-300 text-center w-20">2-4Q 소계</th>
                        {quarters.map(q => (
                          <th key={q.name} colSpan="3" className="p-2 text-center font-bold border-r border-gray-300 last:border-0 bg-slate-200">
                            {q.name}
                          </th>
                        ))}
                      </tr>
                      <tr className="bg-slate-50 text-slate-600 text-xs border-b border-gray-300">
                        <th className="p-2 w-28 border-r border-gray-300 text-center">사업부</th>
                        <th className="p-2 w-44 border-r border-gray-300 text-center">세부항목</th>
                        <th className="p-2 border-r border-gray-300 text-center text-[10px] font-normal text-gray-400 leading-tight">실적<br/>(확정)</th>
                        <th className="p-2 border-r border-gray-300 text-center text-[10px] font-normal text-gray-400">누적<br/>예상</th>
                        {quarters.map((q, qIndex) => (
                          q.months.map((m, mIndex) => (
                            <th key={m} className={`p-2 text-center w-16 ${mIndex === 2 && qIndex !== 2 ? 'border-r border-gray-300' : 'border-r border-gray-200'}`}>
                              {m}월
                            </th>
                          ))
                        ))}
                      </tr>
                    </thead>
                    <tbody className="text-sm">
                      {dbData.map((division) => {
                        return division.categories.map((cat, catIndex) => {
                          const isFirstCat = catIndex === 0;
                          let rowTotal2_4Q = 0;
                          allMonths.forEach(m => { rowTotal2_4Q += getCatMonthlyTotal(cat, m); });

                          return (
                            <React.Fragment key={cat.id}>
                              {/* Category Main Row */}
                              <tr className="border-b border-gray-200 hover:bg-gray-50 transition-colors">
                                <td className={`${division.color} border-r ${division.colorBorder} text-center font-bold text-gray-800`}>
                                  {isFirstCat && division.name}
                                </td>
                                <td className="p-2.5 border-r border-gray-200 text-gray-700">
                                  <div 
                                    className={`font-bold flex items-center justify-between group ${cat.clients.length > 0 ? 'cursor-pointer text-gray-900' : 'text-gray-500'}`}
                                    onClick={() => cat.clients.length > 0 && toggleCat(cat.id)}
                                  >
                                    <span>
                                      {cat.name} 
                                      {cat.type === 'pipeline' && <span className="text-[10px] font-normal text-emerald-600 bg-emerald-50 px-1 py-0.5 rounded ml-1 border border-emerald-100">파이프라인</span>}
                                    </span>
                                    {cat.clients.length > 0 && (
                                      expandedCats.includes(cat.id) ? <ChevronDown size={16} className="text-gray-400"/> : <ChevronRight size={16} className="text-gray-400"/>
                                    )}
                                  </div>
                                </td>
                                <td className={`border-r border-gray-200 ${hatchedBg}`}></td>
                                <td className="p-2 border-r border-gray-200 text-center font-semibold text-gray-800 bg-gray-50/50">
                                  {rowTotal2_4Q > 0 ? rowTotal2_4Q.toFixed(1).replace('.0', '') : '-'}
                                </td>
                                {allMonths.map((m, mIndex) => {
                                  const totalVal = getCatMonthlyTotal(cat, m);
                                  const isQEnd = mIndex === 2 || mIndex === 5;
                                  let styles = cat.type === 'simple' ? "font-semibold text-gray-800" : "font-bold text-emerald-700 bg-emerald-50/50";
                                  return (
                                    <td key={m} className={`p-1 align-middle border-r ${isQEnd ? 'border-gray-300' : 'border-gray-100'}`}>
                                      {totalVal > 0 ? <div className={`text-center ${styles}`}>{totalVal.toFixed(1).replace('.0', '')}</div> : null}
                                    </td>
                                  );
                                })}
                              </tr>

                              {/* Expanded Simple Items (Non-ODM) */}
                              {cat.type === 'simple' && expandedCats.includes(cat.id) && cat.clients.map(client => {
                                if (client.isRegion) {
                                  return (
                                    <tr key={client.id} className="border-b border-gray-100 bg-teal-50/60">
                                      <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                      <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs font-bold text-teal-800 pl-4">{client.name}</td>
                                      {allMonths.map((m, mIndex) => <td key={`reg-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'}`}></td>)}
                                    </tr>
                                  );
                                }
                                
                                const hasSubClients = client.subClients && client.subClients.length > 0;
                                const isClientExpanded = expandedClients.includes(client.id);

                                return (
                                  <React.Fragment key={client.id}>
                                    <tr className="border-b border-gray-100 bg-slate-50/40 hover:bg-slate-100 transition-colors">
                                      <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                      <td colSpan="3" className={`p-2 border-r border-gray-200 text-sm text-gray-600 pl-8 ${hasSubClients ? 'cursor-pointer' : ''}`} onClick={() => hasSubClients && toggleClient(client.id)}>
                                        <div className="flex items-center gap-1.5">
                                          {hasSubClients && (isClientExpanded ? <ChevronDown size={14} className="text-gray-400"/> : <ChevronRight size={14} className="text-gray-400"/>)}
                                          <span className="font-medium">└ {client.name}</span>
                                        </div>
                                      </td>
                                      {allMonths.map((m, mIndex) => {
                                        const isQEnd = mIndex === 2 || mIndex === 5;
                                        if (hasSubClients) {
                                            const cVal = getClientMonthlyTotal(client, m, 'simple');
                                            return <td key={`simple-c-${m}`} className={`p-1 border-r ${isQEnd ? 'border-gray-300' : 'border-gray-100'} text-center text-gray-700`}>{cVal > 0 ? cVal.toFixed(1).replace('.0', '') : ''}</td>;
                                        }
                                        return (
                                          <td key={`simple-c-${m}`} className={`p-1 border-r ${isQEnd ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                            <EditableCell 
                                                value={client.data?.[m]} 
                                                isEditMode={isEditMode} 
                                                onSave={(val) => handleDataSave(client.id, m, 'simple', val)} 
                                                baseClass="text-gray-700 font-medium" 
                                            />
                                          </td>
                                        );
                                      })}
                                    </tr>
                                    
                                    {/* SubClients */}
                                    {hasSubClients && isClientExpanded && client.subClients.map(sub => (
                                      <tr key={sub.id} className="border-b border-gray-50 bg-white hover:bg-slate-50 transition-colors">
                                         <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                         <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-14">- {sub.name}</td>
                                         {allMonths.map((m, mIndex) => (
                                           <td key={`simple-sub-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                             <EditableCell 
                                                value={sub.data?.[m]} 
                                                isEditMode={isEditMode} 
                                                onSave={(val) => handleDataSave(sub.id, m, 'simple', val)} 
                                                baseClass="text-gray-600" 
                                            />
                                           </td>
                                         ))}
                                      </tr>
                                    ))}
                                  </React.Fragment>
                                );
                              })}

                              {/* Expanded Pipeline Items (ODM) */}
                              {cat.type === 'pipeline' && expandedCats.includes(cat.id) && cat.clients.map(client => {
                                const hasSubClients = client.subClients && client.subClients.length > 0;
                                const isClientExpanded = expandedClients.includes(client.id);

                                return (
                                  <React.Fragment key={client.id}>
                                    <tr className="border-b border-gray-100 bg-slate-50/40 hover:bg-slate-100 transition-colors">
                                      <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                      <td colSpan="3" className="p-2 border-r border-gray-200 text-sm text-gray-700 pl-6 cursor-pointer" onClick={() => toggleClient(client.id)}>
                                        <div className="flex items-center gap-2">
                                          {isClientExpanded ? <ChevronDown size={14} className="text-gray-400"/> : <ChevronRight size={14} className="text-gray-400"/>}
                                          <span className="font-medium">└ {client.name}</span>
                                        </div>
                                      </td>
                                      {allMonths.map((m, mIndex) => (
                                        <td key={`client-s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                          {(!isClientExpanded || hasSubClients) && <div className="mx-auto w-10 py-0.5 rounded text-xs border border-opacity-40 shadow-sm bg-emerald-50 text-emerald-700 font-bold border-emerald-300">{client.data?.shipment?.[m] ? client.data.shipment[m].toFixed(1).replace('.0','') : ''}</div>}
                                        </td>
                                      ))}
                                    </tr>

                                    {/* With SubClients */}
                                    {hasSubClients && isClientExpanded && client.subClients.map(sub => {
                                      const isSubExpanded = expandedClients.includes(sub.id);
                                      return (
                                        <React.Fragment key={sub.id}>
                                          <tr className="border-b border-gray-50 bg-white hover:bg-slate-50 transition-colors">
                                            <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                            <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-700 pl-12 cursor-pointer" onClick={() => toggleClient(sub.id)}>
                                              <div className="flex items-center gap-1.5">
                                                {isSubExpanded ? <ChevronDown size={12} className="text-gray-400"/> : <ChevronRight size={12} className="text-gray-400"/>}
                                                <span className="font-medium">- {sub.name}</span>
                                              </div>
                                            </td>
                                            {allMonths.map((m, mIndex) => (
                                              <td key={`sub-s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center`}>
                                                {!isSubExpanded && <div className="mx-auto w-10 py-0.5 rounded text-xs border border-opacity-40 shadow-sm bg-emerald-50 text-emerald-700 font-bold border-emerald-300">{sub.data?.shipment?.[m] ? sub.data.shipment[m].toFixed(1).replace('.0','') : ''}</div>}
                                              </td>
                                            ))}
                                          </tr>

                                          {/* 3-Stages */}
                                          {isSubExpanded && (
                                            <>
                                              <tr className="border-b border-gray-50 bg-slate-50/30">
                                                <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                                <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-16 flex items-center gap-1.5"><FileSignature size={12} className="text-blue-500"/> ① 계약</td>
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`c-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-blue-50/10`}>
                                                    <EditableCell value={sub.data?.contract?.[m]} isEditMode={isEditMode} onSave={(val) => handleDataSave(sub.id, m, 'contract', val)} baseClass="bg-blue-50 text-blue-700 font-medium border border-blue-200" />
                                                  </td>
                                                ))}
                                              </tr>
                                              <tr className="border-b border-gray-50 bg-slate-50/30">
                                                <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                                <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-16 flex items-center gap-1.5"><ShoppingCart size={12} className="text-purple-500"/> ② 발주</td>
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`p-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-purple-50/10`}>
                                                     <EditableCell value={sub.data?.po?.[m]} isEditMode={isEditMode} onSave={(val) => handleDataSave(sub.id, m, 'po', val)} baseClass="bg-purple-50 text-purple-700 font-medium border border-purple-200" />
                                                  </td>
                                                ))}
                                              </tr>
                                              <tr className="border-b border-gray-100 bg-slate-50/30">
                                                <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                                <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs font-medium text-emerald-700 pl-16 flex items-center gap-1.5"><Truck size={12} className="text-emerald-500"/> ③ 출고</td>
                                                {allMonths.map((m, mIndex) => (
                                                  <td key={`s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-emerald-50/20`}>
                                                    <EditableCell value={sub.data?.shipment?.[m]} isEditMode={isEditMode} onSave={(val) => handleDataSave(sub.id, m, 'shipment', val)} baseClass="bg-emerald-50 text-emerald-700 font-bold border border-emerald-300" />
                                                  </td>
                                                ))}
                                              </tr>
                                            </>
                                          )}
                                        </React.Fragment>
                                      );
                                    })}

                                    {/* Direct Company (No SubClients) */}
                                    {!hasSubClients && isClientExpanded && (
                                      <>
                                        <tr className="border-b border-gray-50 bg-white">
                                          <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                          <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-12 flex items-center gap-1.5"><FileSignature size={12} className="text-blue-500"/> ① 계약</td>
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`c-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-blue-50/10`}>
                                              <EditableCell value={client.data?.contract?.[m]} isEditMode={isEditMode} onSave={(val) => handleDataSave(client.id, m, 'contract', val)} baseClass="bg-blue-50 text-blue-700 font-medium border border-blue-200" />
                                            </td>
                                          ))}
                                        </tr>
                                        <tr className="border-b border-gray-50 bg-white">
                                          <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                          <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs text-gray-500 pl-12 flex items-center gap-1.5"><ShoppingCart size={12} className="text-purple-500"/> ② 발주</td>
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`p-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-purple-50/10`}>
                                              <EditableCell value={client.data?.po?.[m]} isEditMode={isEditMode} onSave={(val) => handleDataSave(client.id, m, 'po', val)} baseClass="bg-purple-50 text-purple-700 font-medium border border-purple-200" />
                                            </td>
                                          ))}
                                        </tr>
                                        <tr className="border-b border-gray-200 bg-white">
                                          <td className={`${division.color} border-r ${division.colorBorder}`}></td>
                                          <td colSpan="3" className="p-1.5 border-r border-gray-200 text-xs font-medium text-emerald-700 pl-12 flex items-center gap-1.5"><Truck size={12} className="text-emerald-500"/> ③ 출고</td>
                                          {allMonths.map((m, mIndex) => (
                                            <td key={`s-${m}`} className={`p-1 border-r ${mIndex === 2 || mIndex === 5 ? 'border-gray-300' : 'border-gray-100'} text-center bg-emerald-50/20`}>
                                              <EditableCell value={client.data?.shipment?.[m]} isEditMode={isEditMode} onSave={(val) => handleDataSave(client.id, m, 'shipment', val)} baseClass="bg-emerald-50 text-emerald-700 font-bold border border-emerald-300" />
                                            </td>
                                          ))}
                                        </tr>
                                      </>
                                    )}
                                  </React.Fragment>
                                );
                              })}
                            </React.Fragment>
                          );
                        });
                      })}
                      
                      {/* Total Rows */}
                      <tr className="bg-slate-800 text-white font-bold tracking-wide border-b border-slate-700">
                        <td rowSpan="3" className="p-3 text-center border-r border-slate-700 align-middle bg-slate-900">
                          합계
                        </td>
                        <td className="p-2 text-left pl-4 border-r border-slate-700 text-blue-300 text-sm bg-slate-800/80">① 계약 체결 기준</td>
                        <td className="p-2 text-center border-r border-slate-700 text-blue-300 bg-slate-800/80">12.3</td>
                        <td className="p-2 text-center border-r border-slate-700 text-blue-300 bg-slate-800/80">{totals.contract.q2to4.toFixed(1).replace('.0', '')}</td>
                        {allMonths.map((m, mIndex) => (
                            <td key={`total-c-${m}`} className={`p-2 text-center border-r ${mIndex === 2 || mIndex === 5 ? 'border-slate-600' : 'border-slate-700'} bg-slate-800/80 text-blue-300`}>{totals.contract.monthly[m] > 0 ? totals.contract.monthly[m].toFixed(1).replace('.0', '') : '-'}</td>
                        ))}
                      </tr>
                      <tr className="bg-slate-800 text-white font-bold tracking-wide border-b border-slate-700">
                        <td className="p-2 text-left pl-4 border-r border-slate-700 text-purple-300 text-sm bg-slate-800/90">② 발주 기준</td>
                        <td className="p-2 text-center border-r border-slate-700 text-purple-300 bg-slate-800/90">12.3</td>
                        <td className="p-2 text-center border-r border-slate-700 text-purple-300 bg-slate-800/90">{totals.po.q2to4.toFixed(1).replace('.0', '')}</td>
                        {allMonths.map((m, mIndex) => (
                            <td key={`total-p-${m}`} className={`p-2 text-center border-r ${mIndex === 2 || mIndex === 5 ? 'border-slate-600' : 'border-slate-700'} bg-slate-800/90 text-purple-300`}>{totals.po.monthly[m] > 0 ? totals.po.monthly[m].toFixed(1).replace('.0', '') : '-'}</td>
                        ))}
                      </tr>
                      <tr className="bg-slate-800 text-white font-bold tracking-wide">
                        <td className="p-2 text-left pl-4 border-r border-slate-700 text-emerald-300 text-sm">③ 출고 기준</td>
                        <td className="p-2 text-center border-r border-slate-700 text-emerald-300">12.3</td>
                        <td className="p-2 text-center border-r border-slate-700 text-emerald-300">{totals.shipment.q2to4.toFixed(1).replace('.0', '')}</td>
                        {allMonths.map((m, mIndex) => (
                            <td key={`total-s-${m}`} className={`p-2 text-center border-r ${mIndex === 2 || mIndex === 5 ? 'border-slate-600' : 'border-slate-700'} text-emerald-300`}>{totals.shipment.monthly[m] > 0 ? totals.shipment.monthly[m].toFixed(1).replace('.0', '') : '-'}</td>
                        ))}
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OdmDashboard />);
    </script>
</body>
</html>
